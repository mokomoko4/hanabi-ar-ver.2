<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>管理画面</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#06001a;--panel:#0f0028;--gold:#ffcc44;--text:#fff;--muted:rgba(255,255,255,0.5);--border:rgba(255,255,255,0.12);}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 40px;}

/* ログイン */
.login-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;gap:16px;padding:32px;
}
.login-title{font-size:18px;font-weight:900;color:var(--gold);}
.login-sub{font-size:12px;color:var(--muted);}
.pw-input{
  width:100%;max-width:280px;padding:14px 18px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;color:var(--text);font-size:16px;
  outline:none;text-align:center;letter-spacing:0.2em;
}
.pw-input:focus{border-color:rgba(255,200,60,0.5);}
.login-btn{
  width:100%;max-width:280px;padding:14px;border:none;
  border-radius:14px;background:linear-gradient(135deg,#ff6b00,#ffcc00);
  color:#000;font-size:15px;font-weight:900;cursor:pointer;
}
.login-btn:active{transform:scale(0.97);}
.login-err{font-size:12px;color:#ff6666;display:none;}
.login-err.show{display:block;}

/* 管理コンテンツ */
.admin-wrap{display:none;padding:0 0 40px;}
.admin-wrap.show{display:block;}

.header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(6,0,26,0.98) 0%,transparent 100%);position:sticky;top:0;z-index:10;}
.back{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:#fff;text-decoration:none;}
.header-title{font-size:15px;font-weight:700;color:#ff6666;}
.header-sub{font-size:10px;color:var(--muted);margin-top:2px;}

.body{padding:16px;}
.section-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

.work-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:var(--panel);
  border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;
}
.work-thumb{
  width:56px;height:56px;border-radius:8px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}
.work-thumb img{width:100%;height:100%;object-fit:cover;}
.work-info{flex:1;min-width:0;}
.work-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.work-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.work-visible{font-size:10px;margin-top:3px;}
.work-visible.on{color:#88ffaa;}
.work-visible.off{color:rgba(255,255,255,0.3);}
.work-delete{
  padding:8px 14px;border-radius:10px;
  border:1px solid rgba(255,80,80,0.5);
  background:rgba(255,50,50,0.1);
  color:#ff7070;font-size:12px;font-weight:700;
  cursor:pointer;flex-shrink:0;
}
.work-delete:active{transform:scale(0.96);}

.empty{font-size:12px;color:var(--muted);text-align:center;padding:24px;}
</style>
</head>
<body>

<!-- ログイン -->
<div class="login-wrap" id="loginWrap">
  <div class="login-title">🔐 管理画面</div>
  <div class="login-sub">運営用パスワードを入力してください</div>
  <input class="pw-input" id="pwInput" type="password" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="login-btn" onclick="checkPw()">ログイン</button>
  <div class="login-err" id="loginErr">パスワードが違います</div>
</div>

<!-- 管理コンテンツ -->
<div class="admin-wrap" id="adminWrap">
  <div class="header">
    <a class="back" href="index.html">←</a>
    <div>
      <div class="header-title">管理画面</div>
      <div class="header-sub">作品の削除はここから</div>
    </div>
  </div>
  <div class="body">
    <div class="section-label">全作品一覧</div>
    <div id="worksList"><div class="empty">読み込み中…</div></div>
  </div>
</div>

<script>
const ADMIN_PW = 'hanabi';

function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').classList.add('show');
    initAdmin();
  } else {
    document.getElementById('loginErr').classList.add('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

firebase.initializeApp({
  apiKey: "AIzaSyDGlQeMC6iJzWAB16teP_5oC2FeBcgZxmA",
  authDomain: "hanabi-ar-1754a.firebaseapp.com",
  databaseURL: "https://hanabi-ar-1754a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hanabi-ar-1754a",
  storageBucket: "hanabi-ar-1754a.firebasestorage.app",
  messagingSenderId: "861479696200",
  appId: "1:861479696200:web:393add8997cf25affd657d"
});
const db = firebase.database();
const storage = firebase.storage();

function initAdmin() {
  db.ref('works').on('value', snap => {
    const list = document.getElementById('worksList');
    const works = snap.val();

    if (!works) {
      list.innerHTML = '<div class="empty">作品がありません</div>';
      return;
    }

    list.innerHTML = '';
    Object.entries(works).reverse().forEach(([key, work]) => {
      const item = document.createElement('div');
      item.className = 'work-item';
      const thumb = work.url
        ? `<img src="${work.url}">`
        : `<span>🖼️</span>`;
      const date = new Date(work.createdAt).toLocaleDateString('ja-JP');
      const isVisible = work.visible !== false;
      item.innerHTML = `
        <div class="work-thumb">${thumb}</div>
        <div class="work-info">
          <div class="work-name">${work.name || 'なまえなし'}</div>
          <div class="work-meta">${(work.type||'').toUpperCase()} · ${date}</div>
          <div class="work-visible ${isVisible ? 'on' : 'off'}">${isVisible ? '● AR表示中' : '○ 非表示'}</div>
        </div>
        <button class="work-delete" onclick="deleteWork('${key}', '${work.url || ''}')">削除</button>
      `;
      list.appendChild(item);
    });
  });
}

async function deleteWork(key, url) {
  if (!confirm('この作品を本当に削除しますか？\n元に戻せません。')) return;
  await db.ref('works/' + key).remove();
  if (url) {
    try { await storage.refFromURL(url).delete(); } catch(e) {}
  }
}
</script>
</body>
</html>
