<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>さくひんをアップする</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#06001a;--panel:#0f0028;--gold:#ffcc44;--gold2:#ff8800;--text:#fff;--muted:rgba(255,255,255,0.5);--border:rgba(255,255,255,0.12);}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 40px;}

.header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(6,0,26,0.98) 0%,transparent 100%);position:sticky;top:0;z-index:10;}
.back{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:#fff;text-decoration:none;}
.header-title{font-size:15px;font-weight:700;color:var(--gold);}
.header-sub{font-size:10px;color:var(--muted);margin-top:2px;}

.body{padding:16px;}

/* プレビュー */
.preview-wrap{
  width:100%;aspect-ratio:1;max-width:280px;
  margin:0 auto 20px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;
}
.preview-wrap img{width:100%;height:100%;object-fit:contain;}
.preview-placeholder{text-align:center;color:var(--muted);}
.preview-placeholder .icon{font-size:48px;margin-bottom:8px;}
.preview-placeholder .text{font-size:13px;}
.preview-placeholder .sub{font-size:11px;margin-top:4px;color:rgba(255,255,255,0.25);}
.preview-badge{
  position:absolute;top:10px;right:10px;
  padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;
}
.preview-badge.png{background:rgba(100,255,150,0.2);color:#88ffaa;border:1px solid rgba(100,255,150,0.3);}

/* 入力 */
.section-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-bottom:8px;margin-top:20px;display:flex;align-items:center;gap:6px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.name-input{width:100%;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;font-family:inherit;}
.name-input::placeholder{color:var(--muted);}
.name-input:focus{border-color:rgba(255,200,60,0.4);}

/* ファイル選択ボタン */
.file-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.file-btn{padding:12px 8px;border-radius:12px;border:1.5px dashed rgba(255,255,255,0.2);background:transparent;color:var(--muted);font-size:12px;text-align:center;cursor:pointer;transition:all 0.15s;}
.file-btn:active{transform:scale(0.97);}
.file-btn.png-btn{border-color:rgba(100,255,150,0.3);}
.file-btn.draw-btn{border-color:rgba(100,180,255,0.4);color:rgba(120,200,255,0.9);}
.file-btn .bi{font-size:24px;display:block;margin-bottom:4px;}

/* お絵描きモーダル */
.draw-modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:#06001a;flex-direction:column;
}
.draw-modal.open{display:flex;}
.draw-header{
  padding:10px 12px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(15,0,40,0.95);flex-shrink:0;
}
.draw-title{font-size:14px;font-weight:700;color:var(--gold);}
.draw-done{padding:8px 20px;border-radius:20px;border:none;background:linear-gradient(135deg,#ff6b00,#ffcc00);color:#000;font-size:13px;font-weight:900;cursor:pointer;}
.draw-canvas-wrap{flex:1;position:relative;overflow:hidden;touch-action:none;}
#drawCanvas{display:block;width:100%;height:100%;cursor:crosshair;}
.draw-toolbar{
  padding:10px 12px 16px;background:rgba(15,0,40,0.95);
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.color-btns{display:flex;gap:6px;align-items:center;}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s;}
.color-dot.active{border-color:#fff;transform:scale(1.2);}
.tool-sep{width:1px;height:28px;background:var(--border);}
.size-wrap{display:flex;align-items:center;gap:6px;}
.size-wrap input[type=range]{width:80px;accent-color:var(--gold);}
.eraser-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}
.eraser-btn.active{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.5);}
.clear-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,100,100,0.3);background:transparent;color:rgba(255,120,120,0.8);font-size:12px;cursor:pointer;}
.bg-btns{display:flex;gap:6px;align-items:center;}
.bg-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.bg-dot.active{border-color:var(--gold);}
.tool-label{font-size:10px;color:var(--muted);}

/* アップロードボタン */
.upload-btn{
  width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,#ff6b00,#ffcc00);
  color:#000;font-size:16px;font-weight:900;
  cursor:pointer;margin-top:24px;
  display:none;transition:all 0.15s;
}
.upload-btn.show{display:block;}
.upload-btn:active{transform:scale(0.97);}
.upload-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* 進捗 */
.progress-wrap{margin-top:16px;display:none;}
.progress-wrap.show{display:block;}
.progress-bar-bg{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;}
.progress-bar{height:100%;background:linear-gradient(90deg,#ff6b00,#ffcc00);border-radius:3px;width:0%;transition:width 0.3s;}
.progress-text{font-size:12px;color:var(--muted);margin-top:6px;text-align:center;}

/* 成功 */
.success-msg{
  display:none;margin-top:16px;padding:16px;
  background:rgba(100,255,150,0.08);
  border:1px solid rgba(100,255,150,0.3);
  border-radius:12px;text-align:center;
}
.success-msg.show{display:block;}
.success-msg .emoji{font-size:32px;margin-bottom:8px;}
.success-msg p{font-size:13px;color:#88ffaa;}

/* 作品一覧 */
.works-list{margin-top:24px;}
.work-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:var(--panel);
  border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;
}
.work-thumb{
  width:48px;height:48px;border-radius:8px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}
.work-thumb img{width:100%;height:100%;object-fit:cover;}
.work-info{flex:1;min-width:0;}
.work-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.work-meta{font-size:10px;color:var(--muted);margin-top:2px;}
/* トグルスイッチ */
.toggle-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.toggle-label{font-size:10px;color:var(--muted);white-space:nowrap;}
.toggle{position:relative;display:inline-block;width:38px;height:22px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,0.15);border-radius:22px;cursor:pointer;transition:0.2s;}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.2s;}
.toggle input:checked + .toggle-slider{background:rgba(100,220,120,0.7);}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px);}
</style>
</head>
<body>

<div class="header">
  <a class="back" href="index.html">←</a>
  <div>
    <div class="header-title">さくひんをアップする</div>
    <div class="header-sub">えをARにのせよう</div>
  </div>
</div>

<div class="body">

  <!-- プレビュー -->
  <div class="preview-wrap" id="previewWrap" onclick="document.getElementById('pngInput').click()">
    <div class="preview-placeholder" id="previewPlaceholder">
      <div class="icon">🖼️</div>
      <div class="text">タップして画像を選ぶ</div>
      <div class="sub">PNG・JPG・GIF対応</div>
    </div>
  </div>
  <input type="file" id="pngInput" accept="image/*" style="display:none;" onchange="handlePNG(this)">

  <!-- 名前 -->
  <div class="section-label">なまえ</div>
  <input class="name-input" id="nameInput" type="text" placeholder="だれがつくったか書いてね" maxlength="20">

  <!-- ファイル選択 -->
  <div class="section-label">ファイルを選ぶ</div>
  <div class="file-btns">
    <div class="file-btn png-btn" onclick="document.getElementById('pngInput').click()">
      <span class="bi">🖼️</span>
      えや写真<br>（PNG・JPG）
    </div>
    <div class="file-btn draw-btn" onclick="openDrawModal()">
      <span class="bi">✏️</span>
      お絵描きする<br>（ここで描く）
    </div>
  </div>

  <!-- アップロードボタン -->
  <button class="upload-btn" id="uploadBtn" onclick="uploadWork()">ARにのせる 🚀</button>

  <!-- 進捗 -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">アップロード中…</div>
  </div>

  <!-- 成功メッセージ -->
  <div class="success-msg" id="successMsg">
    <div class="emoji">🎆</div>
    <p>ARに追加されました！<br>看板にカメラを向けると出てくるよ！</p>
  </div>

  <!-- 作品一覧 -->
  <div class="section-label" style="margin-top:32px;">いまのさくひん一覧</div>
  <div class="works-list" id="worksList">
    <div style="font-size:12px;color:var(--muted);text-align:center;padding:16px;">読み込み中…</div>
  </div>

</div>

<!-- お絵描きモーダル -->
<div class="draw-modal" id="drawModal">
  <div class="draw-header">
    <div class="draw-title">✏️ お絵描き</div>
    <button class="draw-done" onclick="finishDraw()">できた！</button>
  </div>
  <div class="draw-canvas-wrap" id="drawCanvasWrap">
    <canvas id="drawCanvas"></canvas>
  </div>
  <div class="draw-toolbar">
    <div>
      <div class="tool-label">いろ</div>
      <div class="color-btns" id="colorBtns">
        <div class="color-dot" data-color="#ffffff" style="background:#ffffff;" onclick="setColor(this)"></div>
        <div class="color-dot" data-color="#ff4444" style="background:#ff4444;" onclick="setColor(this)"></div>
        <div class="color-dot" data-color="#ff9900" style="background:#ff9900;" onclick="setColor(this)"></div>
        <div class="color-dot" data-color="#ffee00" style="background:#ffee00;" onclick="setColor(this)"></div>
        <div class="color-dot" data-color="#44ff88" style="background:#44ff88;" onclick="setColor(this)"></div>
        <div class="color-dot" data-color="#44aaff" style="background:#44aaff;" onclick="setColor(this)"></div>
        <div class="color-dot" data-color="#ff44ff" style="background:#ff44ff;" onclick="setColor(this)"></div>
        <div class="color-dot active" data-color="#000000" style="background:#000;border:1.5px solid #444;" onclick="setColor(this)"></div>
      </div>
    </div>
    <div class="tool-sep"></div>
    <div>
      <div class="tool-label">ふとさ</div>
      <div class="size-wrap">
        <span style="font-size:10px;">細</span>
        <input type="range" id="sizeSlider" min="2" max="40" value="8" oninput="penSize=+this.value">
        <span style="font-size:10px;">太</span>
      </div>
    </div>
    <div class="tool-sep"></div>
    <button class="eraser-btn" id="eraserBtn" onclick="toggleEraser()">消しゴム</button>
    <div class="tool-sep"></div>
    <div>
      <div class="tool-label">背景</div>
      <div class="bg-btns">
        <div class="bg-dot" data-bg="#06001a" style="background:#06001a;border:1.5px solid #444;" onclick="setBg(this,'#06001a')"></div>
        <div class="bg-dot active" data-bg="#ffffff" style="background:#ffffff;" onclick="setBg(this,'#ffffff')"></div>
        <div class="bg-dot" data-bg="#ffe0f0" style="background:#ffe0f0;" onclick="setBg(this,'#ffe0f0')"></div>
        <div class="bg-dot" data-bg="#e0f8ff" style="background:#e0f8ff;" onclick="setBg(this,'#e0f8ff')"></div>
      </div>
    </div>
    <div class="tool-sep"></div>
    <button class="clear-btn" onclick="clearCanvas()">クリア</button>
  </div>
</div>

<script>
// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDGlQeMC6iJzWAB16teP_5oC2FeBcgZxmA",
  authDomain: "hanabi-ar-1754a.firebaseapp.com",
  databaseURL: "https://hanabi-ar-1754a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hanabi-ar-1754a",
  storageBucket: "hanabi-ar-1754a.firebasestorage.app",
  messagingSenderId: "861479696200",
  appId: "1:861479696200:web:393add8997cf25affd657d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let selectedFile = null;
let selectedType = null;

// ===== お絵描き =====
let drawCtx, drawCanvas;
let drawing = false;
let penColor = '#000000';
let penSize = 8;
let erasing = false;
let canvasBg = '#ffffff';

function openDrawModal() {
  document.getElementById('drawModal').classList.add('open');
  initCanvas();
}

function initCanvas() {
  drawCanvas = document.getElementById('drawCanvas');
  const wrap = document.getElementById('drawCanvasWrap');
  drawCanvas.width = wrap.clientWidth;
  drawCanvas.height = wrap.clientHeight;
  drawCtx = drawCanvas.getContext('2d');
  drawCtx.fillStyle = canvasBg;
  drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);

  drawCanvas.addEventListener('pointerdown', startDraw, {passive:false});
  drawCanvas.addEventListener('pointermove', moveDraw, {passive:false});
  drawCanvas.addEventListener('pointerup', endDraw);
  drawCanvas.addEventListener('pointercancel', endDraw);
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  drawCtx.beginPath();
  drawCtx.moveTo(pos.x, pos.y);
}

function moveDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const pos = getPos(e);
  drawCtx.lineWidth = penSize;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  if (erasing) {
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.strokeStyle = 'rgba(0,0,0,1)';
    drawCtx.lineWidth = penSize * 2;
  } else {
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.strokeStyle = penColor;
  }
  drawCtx.lineTo(pos.x, pos.y);
  drawCtx.stroke();
  drawCtx.beginPath();
  drawCtx.moveTo(pos.x, pos.y);
}

function endDraw() { drawing = false; drawCtx && drawCtx.beginPath(); }

function setColor(el) {
  erasing = false;
  document.getElementById('eraserBtn').classList.remove('active');
  penColor = el.dataset.color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

function toggleEraser() {
  erasing = !erasing;
  document.getElementById('eraserBtn').classList.toggle('active', erasing);
}

function setBg(el, color) {
  canvasBg = color;
  document.querySelectorAll('.bg-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  if (drawCtx) {
    const imageData = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
    drawCtx.fillStyle = color;
    drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
    drawCtx.putImageData(imageData, 0, 0);
  }
}

function clearCanvas() {
  if (!drawCtx) return;
  drawCtx.globalCompositeOperation = 'source-over';
  drawCtx.fillStyle = canvasBg;
  drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function finishDraw() {
  drawCtx.globalCompositeOperation = 'source-over';
  drawCanvas.toBlob(blob => {
    selectedFile = new File([blob], `oekaki_${Date.now()}.png`, {type:'image/png'});
    selectedType = 'png';

    const url = URL.createObjectURL(blob);
    const wrap = document.getElementById('previewWrap');
    wrap.innerHTML = `
      <img src="${url}" style="width:100%;height:100%;object-fit:contain;">
      <div class="preview-badge png">お絵描き</div>
    `;
    wrap.onclick = () => openDrawModal();

    document.getElementById('uploadBtn').classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
    document.getElementById('drawModal').classList.remove('open');
  }, 'image/png');
}

// PNG選択
function handlePNG(input) {
  const file = input.files[0];
  if(!file) return;
  selectedFile = file;
  selectedType = 'png';

  const reader = new FileReader();
  reader.onload = e => {
    const wrap = document.getElementById('previewWrap');
    wrap.innerHTML = `
      <img src="${e.target.result}" style="width:100%;height:100%;object-fit:contain;">
      <div class="preview-badge png">PNG</div>
    `;
    wrap.onclick = () => document.getElementById('pngInput').click();
  };
  reader.readAsDataURL(file);
  document.getElementById('uploadBtn').classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}

// アップロード
async function uploadWork() {
  if(!selectedFile) return;

  const name = document.getElementById('nameInput').value.trim() || 'なまえなし';
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = 'アップロード中…';

  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = 'ファイルを送っています…';

  try {
    // Storageにアップロード
    const ext = selectedFile.name.split('.').pop();
    const filename = `works/${Date.now()}_${name}.${ext}`;
    const ref = storage.ref(filename);
    const task = ref.put(selectedFile);

    // 進捗表示
    task.on('state_changed', (snap) => {
      const pct = (snap.bytesTransferred / snap.totalBytes) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${Math.round(pct)}% 完了`;
    });

    await task;
    const url = await ref.getDownloadURL();

    // Databaseに登録
    await db.ref('works').push({
      type: selectedType,
      url: url,
      name: name,
      createdAt: Date.now()
    });

    // 成功
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressText').textContent = '完了！';
    document.getElementById('successMsg').classList.add('show');
    btn.disabled = false;
    btn.textContent = 'ARにのせる 🚀';

    // リセット
    selectedFile = null;
    selectedType = null;
    document.getElementById('nameInput').value = '';
    document.getElementById('previewWrap').innerHTML = `
      <div class="preview-placeholder" id="previewPlaceholder">
        <div class="icon">🖼️</div>
        <div class="text">タップして画像を選ぶ</div>
        <div class="sub">PNG・JPG・GIF対応</div>
      </div>
    `;
    document.getElementById('previewWrap').onclick = () => document.getElementById('pngInput').click();
    document.getElementById('pngInput').value = '';
    if (drawCtx) clearCanvas();

  } catch(e) {
    alert('エラーが発生しました: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'ARにのせる 🚀';
  }
}

// 作品一覧をリアルタイム表示
db.ref('works').on('value', (snap) => {
  const list = document.getElementById('worksList');
  const works = snap.val();

  if(!works) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px;">まだ作品がありません</div>';
    return;
  }

  list.innerHTML = '';
  Object.entries(works).reverse().forEach(([key, work]) => {
    const item = document.createElement('div');
    item.className = 'work-item';
    const thumb = work.url
      ? `<img src="${work.url}" style="width:100%;height:100%;object-fit:cover;">`
      : `<span style="font-size:24px;">🖼️</span>`;
    const date = new Date(work.createdAt).toLocaleDateString('ja-JP');
    const isVisible = work.visible !== false;
    item.innerHTML = `
      <div class="work-thumb">${thumb}</div>
      <div class="work-info">
        <div class="work-name">${work.name || 'なまえなし'}</div>
        <div class="work-meta">${work.type.toUpperCase()} · ${date}</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">${isVisible ? 'AR表示中' : '非表示'}</span>
        <label class="toggle">
          <input type="checkbox" ${isVisible ? 'checked' : ''} onchange="toggleVisible('${key}', this)">
          <span class="toggle-slider"></span>
        </label>
      </div>
    `;
    list.appendChild(item);
  });
});

// 表示トグル
async function toggleVisible(key, checkbox) {
  const visible = checkbox.checked;
  const label = checkbox.closest('.toggle-wrap').querySelector('.toggle-label');
  label.textContent = visible ? 'AR表示中' : '非表示';
  await db.ref('works/' + key).update({ visible });
}
