<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はなびAR</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}
#bgVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#arCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#fxCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:8;pointer-events:all;}
.ar-ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
.ar-header{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;align-items:center;gap:10px;pointer-events:all;}
.ar-back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#fff;text-decoration:none;}
.ar-title{font-size:14px;font-weight:700;color:#ffcc44;}
.ar-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.ar-count{margin-left:auto;padding:4px 12px;border-radius:20px;background:rgba(255,200,60,0.15);border:1px solid rgba(255,200,60,0.3);font-size:11px;color:#ffcc44;}
.ar-status{margin:auto auto 0;padding:8px 20px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:20px;font-size:12px;color:rgba(255,255,255,0.8);text-align:center;transition:all 0.4s;pointer-events:none;}
.ar-status.found{border-color:rgba(100,255,150,0.5);color:#88ffaa;background:rgba(0,40,20,0.7);}
.ar-bottom{padding:12px 16px 28px;background:linear-gradient(0deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;gap:8px;pointer-events:all;}
.ar-btn{flex:1;padding:11px 8px;border-radius:14px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:11px;text-align:center;cursor:pointer;}
.ar-btn .bi{font-size:20px;display:block;margin-bottom:3px;}
.ar-work-overlay{
  position:fixed;z-index:5;
  transition:opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin:center center;
  opacity:0;
  transform:scale(0);
  pointer-events:none;
}
.ar-work-overlay.visible{
  opacity:1;
  transform:scale(1);
  pointer-events:all;
}
.ar-name-tag{
  position:fixed;z-index:5;pointer-events:none;
  transition:opacity 0.5s ease;
  opacity:0;
}
.ar-name-tag.visible{opacity:1;}
</style>
</head>
<body>

<video id="bgVideo" autoplay playsinline muted></video>
<canvas id="arCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<div class="ar-ui">
  <div class="ar-header">
    <a class="ar-back" href="index.html">←</a>
    <div>
      <div class="ar-title">はなびAR</div>
      <div class="ar-sub" id="arSub">カメラを起動中…</div>
    </div>
    <div class="ar-count" id="arCount">0 作品</div>
  </div>
  <div class="ar-status found" id="arStatus">✨ タップして作品を出そう！</div>
  <div class="ar-bottom">
    <div class="ar-btn" onclick="window.location.href='index.html'"><span class="bi">←</span>もどる</div>
    <div class="ar-btn" onclick="alert('スマホのスクショで撮ってね！')"><span class="bi">📸</span>写真を撮る</div>
  </div>
</div>

<script>
// ── 2D花火エフェクト ──
const fxCanvas = document.getElementById('fxCanvas');
fxCanvas.width = window.innerWidth;
fxCanvas.height = window.innerHeight;
const fx2d = fxCanvas.getContext('2d');

let audioCtx = null;
function getAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// 音量を元の30%に設定
function playBoom(vol) {
  try {
    const ctx = getAudio();
    const sr = ctx.sampleRate;
    const n = Math.floor(sr*0.5);
    const buf = ctx.createBuffer(1,n,sr);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.12));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol||0.09, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
    src.connect(g); g.connect(ctx.destination);
    src.start();
  } catch(e){}
}
function playWhistle() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime+0.45);
    g.gain.setValueAtTime(0.03, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.45);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.45);
  } catch(e){}
}

const FW_COLORS_2D = ['#ff4444','#ff8800','#ffee00','#44ff88','#4488ff','#cc44ff','#ff88cc','#44ffdd'];
const particles2D = [];

function spawnBurst(x, y, big) {
  const color = FW_COLORS_2D[Math.floor(Math.random()*FW_COLORS_2D.length)];
  const count = big ? 70 : 40;
  const maxSpeed = big ? 8 : 5;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1.5 + Math.random()*maxSpeed;
    particles2D.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      color,
      life: 1.0,
      decay: 0.012 + Math.random()*0.018,
      size: 2 + Math.random()*(big?4:2.5)
    });
  }
  playWhistle();
  setTimeout(() => playBoom(big ? 0.12 : 0.075), 420);
}

function renderFX() {
  fx2d.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  for(let i=particles2D.length-1; i>=0; i--){
    const p = particles2D[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.13;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.decay;
    if(p.life<=0){ particles2D.splice(i,1); continue; }
    fx2d.globalAlpha = p.life;
    fx2d.fillStyle = p.color;
    fx2d.beginPath();
    fx2d.arc(p.x, p.y, p.size, 0, Math.PI*2);
    fx2d.fill();
  }
  fx2d.globalAlpha = 1;
}

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDGlQeMC6iJzWAB16teP_5oC2FeBcgZxmA",
  authDomain: "hanabi-ar-1754a.firebaseapp.com",
  databaseURL: "https://hanabi-ar-1754a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hanabi-ar-1754a",
  storageBucket: "hanabi-ar-1754a.firebasestorage.app",
  messagingSenderId: "861479696200",
  appId: "1:861479696200:web:393add8997cf25affd657d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Three.js
const canvas = document.getElementById('arCanvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);
camera.lookAt(0, 0, 0);
scene.add(new THREE.AmbientLight(0xffffff, 2));

// カメラ起動
navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream => {
    document.getElementById('bgVideo').srcObject = stream;
    document.getElementById('arSub').textContent = 'タップして作品を出そう';
  })
  .catch(() => {
    document.getElementById('arSub').textContent = 'カメラの許可が必要です';
  });

// 作品管理
const meshWorks = [];
const addedIds = new Set();
let worksVisible = false;

// HTMLオーバーレイ作品の情報リスト
const workItems = [];

function makeCanvasTexture(color, emoji, label) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(0,0,256,256,32); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.roundRect(12,12,232,232,24); ctx.fill();
  ctx.font = '80px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 128, 100);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(label, 128, 195);
  return new THREE.CanvasTexture(cv);
}

function addWork(work) {
  if(addedIds.has(work.id)) return;
  addedIds.add(work.id);

  const angle = (addedIds.size - 1) * (Math.PI * 2 / 8);
  const r = 1.2;
  const x = Math.cos(angle) * r;
  const y = Math.sin(angle) * r * 0.6;

  const cx = window.innerWidth/2  + x * 120;
  const cy = window.innerHeight/2 - y * 120;

  if(work.type === 'canvas') {
    const tex = makeCanvasTexture(work.color, work.emoji, work.label);
    const geo = new THREE.PlaneGeometry(0.7, 0.7);
    const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, 0);
    mesh.visible = false;
    scene.add(mesh);
    meshWorks.push({mesh, baseY: y, phase: Math.random()*Math.PI*2, cx, cy});

  } else if(work.type === 'png' && work.url) {
    const baseLeft = cx - 60;
    const baseTop  = cy - 60;

    const imgEl = document.createElement('img');
    imgEl.src = work.url;
    imgEl.className = 'ar-work-overlay';
    imgEl.dataset.workId = work.id;
    imgEl.dataset.height = 120;
    imgEl.style.cssText = `width:120px;height:120px;object-fit:contain;border-radius:12px;border:2px solid rgba(255,255,255,0.3);cursor:pointer;left:${baseLeft}px;top:${baseTop}px;`;

    const nameEl = document.createElement('div');
    nameEl.className = 'ar-name-tag';
    nameEl.id = 'name_' + work.id;
    nameEl.textContent = work.name || 'なまえなし';
    nameEl.style.cssText = `left:${baseLeft}px;top:${baseTop+125}px;width:120px;text-align:center;font-size:11px;color:#fff;background:rgba(0,0,0,0.6);border-radius:10px;padding:2px 6px;`;

    imgEl.addEventListener('click', e => {
      e.stopPropagation();
      const z = imgEl.dataset.zoomed === '1';
      imgEl.style.width  = z ? '120px' : '260px';
      imgEl.style.height = z ? '120px' : '260px';
      imgEl.style.zIndex = z ? '5' : '50';
      imgEl.dataset.zoomed = z ? '0' : '1';
    });

    document.body.appendChild(imgEl);
    document.body.appendChild(nameEl);

    let floatT = Math.random()*Math.PI*2;
    const item = {imgEl, nameEl, baseCx:cx, baseCy:cy, baseLeft, baseTop, floatOffset:0};
    setInterval(() => {
      floatT += 0.03;
      item.floatOffset = Math.sin(floatT) * 8;
    }, 16);
    workItems.push(item);

  } else if(work.type === 'glb' && work.url) {
    const baseLeft = cx - 75;
    const baseTop  = cy - 75;

    const mv = document.createElement('model-viewer');
    mv.setAttribute('src', work.url);
    mv.setAttribute('auto-rotate', '');
    mv.setAttribute('camera-controls', '');
    mv.className = 'ar-work-overlay';
    mv.dataset.workId = work.id;
    mv.dataset.height = 150;
    mv.style.cssText = `width:150px;height:150px;background:transparent;--poster-color:transparent;left:${baseLeft}px;top:${baseTop}px;`;

    const nameEl = document.createElement('div');
    nameEl.className = 'ar-name-tag';
    nameEl.textContent = work.name || 'なまえなし';
    nameEl.style.cssText = `left:${baseLeft}px;top:${baseTop+155}px;width:150px;text-align:center;font-size:11px;color:#fff;background:rgba(0,0,0,0.6);border-radius:10px;padding:2px 6px;`;

    document.body.appendChild(mv);
    document.body.appendChild(nameEl);

    let floatT = Math.random()*Math.PI*2;
    const item = {imgEl:mv, nameEl, baseCx:cx, baseCy:cy, baseLeft, baseTop, floatOffset:0};
    setInterval(() => {
      floatT += 0.03;
      item.floatOffset = Math.sin(floatT) * 8;
    }, 16);
    workItems.push(item);
  }

  document.getElementById('arCount').textContent = addedIds.size + ' 作品';
}

db.ref('works').on('child_added', (snap) => {
  const work = snap.val();
  work.id = snap.key;
  addWork(work);
});

// ── 作品の表示トグル ──
function showWorks() {
  worksVisible = true;
  document.getElementById('arStatus').textContent = '🎆 作品が現れた！もう一回タップで消えるよ';
  document.getElementById('arStatus').classList.add('found');

  // HTMLオーバーレイを花火バーストで出す
  workItems.forEach((item, i) => {
    setTimeout(() => {
      item.imgEl.classList.add('visible');
      item.nameEl.classList.add('visible');
      spawnBurst(item.baseCx, item.baseCy, true);
    }, i * 200);
  });

  // Three.jsメッシュも表示
  meshWorks.forEach((w, i) => {
    setTimeout(() => {
      w.mesh.visible = true;
      spawnBurst(w.cx, w.cy, true);
    }, i * 200);
  });
}

function hideWorks() {
  worksVisible = false;
  document.getElementById('arStatus').textContent = '✨ タップして作品を出そう！';
  document.getElementById('arStatus').classList.add('found');

  workItems.forEach(item => {
    item.imgEl.classList.remove('visible');
    item.nameEl.classList.remove('visible');
  });
  meshWorks.forEach(w => { w.mesh.visible = false; });
}

// ── ジャイロ（連続追跡で空間固定） ──
let gyroYaw = 0, gyroPitch = 0, prevAlpha = null;

function startGyro() {
  window.addEventListener('deviceorientation', (e) => {
    if(e.alpha === null) return;
    if(prevAlpha !== null) {
      let da = e.alpha - prevAlpha;
      if(da > 180) da -= 360;
      if(da < -180) da += 360;
      gyroYaw -= da;
    }
    prevAlpha = e.alpha;
    gyroPitch = (e.beta || 0) - 90;
  }, true);
}

if(typeof DeviceOrientationEvent !== 'undefined' &&
   typeof DeviceOrientationEvent.requestPermission === 'function') {
  const gyroBtn = document.createElement('div');
  gyroBtn.textContent = '🌀 センサーを許可';
  gyroBtn.style.cssText = `
    position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
    padding:10px 24px;border-radius:20px;
    background:rgba(255,200,60,0.2);border:1px solid rgba(255,200,60,0.5);
    color:#ffcc44;font-size:13px;cursor:pointer;z-index:200;
    font-family:'Hiragino Kaku Gothic ProN',sans-serif;
    pointer-events:all;
  `;
  gyroBtn.onclick = () => {
    DeviceOrientationEvent.requestPermission().then(state => {
      if(state === 'granted') { startGyro(); gyroBtn.remove(); }
    });
  };
  document.body.appendChild(gyroBtn);
} else {
  startGyro();
}

// ── タップ処理 ──
fxCanvas.addEventListener('click', (e) => {
  try { getAudio().resume(); } catch(err){}

  // 小さい花火を打ち上げ
  spawnBurst(e.clientX, e.clientY, false);

  // 作品トグル
  if(!worksVisible) {
    showWorks();
  } else {
    hideWorks();
  }
});

// HTMLオーバーレイをジャイロで空間固定
function updateOverlayPositions() {
  workItems.forEach(item => {
    const offsetX = gyroYaw * 4;
    const offsetY = gyroPitch * 4;
    const newLeft = item.baseLeft + offsetX;
    const newTop  = item.baseTop  + offsetY + item.floatOffset;
    item.imgEl.style.left = newLeft + 'px';
    item.imgEl.style.top  = newTop + 'px';
    item.nameEl.style.left = newLeft + 'px';
    item.nameEl.style.top  = (newTop + parseInt(item.imgEl.dataset.height||120) + 5) + 'px';
  });
}

// レンダリングループ
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.02;
  meshWorks.forEach(w => {
    if(w.mesh.visible) w.mesh.position.y = w.baseY + Math.sin(t + w.phase) * 0.06;
  });
  updateOverlayPositions();
  renderFX();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
});
</script>
</body>
</html>
