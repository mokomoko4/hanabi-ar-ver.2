<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はなびAR</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}
#bgVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#arCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;}
.ar-ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
.ar-header{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;align-items:center;gap:10px;pointer-events:all;}
.ar-back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#fff;text-decoration:none;}
.ar-title{font-size:14px;font-weight:700;color:#ffcc44;}
.ar-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.ar-count{margin-left:auto;padding:4px 12px;border-radius:20px;background:rgba(255,200,60,0.15);border:1px solid rgba(255,200,60,0.3);font-size:11px;color:#ffcc44;}
.ar-ver{font-size:9px;color:rgba(255,255,255,0.25);margin-left:4px;}
.ar-status{margin:auto auto 0;padding:8px 20px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:20px;font-size:12px;color:rgba(255,255,255,0.8);text-align:center;transition:all 0.4s;}
.ar-status.found{border-color:rgba(100,255,150,0.5);color:#88ffaa;background:rgba(0,40,20,0.7);}
.ar-bottom{padding:12px 16px 28px;background:linear-gradient(0deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;gap:8px;pointer-events:all;}
.ar-btn{flex:1;padding:11px 8px;border-radius:14px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:11px;text-align:center;cursor:pointer;}
.ar-btn .bi{font-size:20px;display:block;margin-bottom:3px;}
</style>
</head>
<body>

<video id="bgVideo" autoplay playsinline muted></video>
<canvas id="arCanvas"></canvas>

<div class="ar-ui">
  <div class="ar-header">
    <a class="ar-back" href="index.html">←</a>
    <div>
      <div class="ar-title">花火の写真に向けてね</div>
      <div class="ar-sub" id="arSub">看板の花火写真にカメラを向けよう</div>
    </div>
    <div class="ar-count" id="arCount">0 作品</div>
    <div class="ar-ver">v3.5</div>
  </div>
  <div class="ar-status" id="arStatus">📷 マーカーを探しています…</div>
  <div class="ar-bottom">
    <div class="ar-btn" onclick="window.location.href='index.html'"><span class="bi">←</span>もどる</div>
    <div class="ar-btn" onclick="alert('スマホのスクショで撮ってね！')"><span class="bi">📸</span>写真を撮る</div>
  </div>
</div>

<script>
// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDGlQeMC6iJzWAB16teP_5oC2FeBcgZxmA",
  authDomain: "hanabi-ar-1754a.firebaseapp.com",
  databaseURL: "https://hanabi-ar-1754a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hanabi-ar-1754a",
  storageBucket: "hanabi-ar-1754a.firebasestorage.app",
  messagingSenderId: "861479696200",
  appId: "1:861479696200:web:393add8997cf25affd657d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Three.js
const canvas = document.getElementById('arCanvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);
camera.lookAt(0, 0, 0);
scene.add(new THREE.AmbientLight(0xffffff, 2));

// カメラ起動
navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream => {
    document.getElementById('bgVideo').srcObject = stream;
    document.getElementById('arSub').textContent = 'カメラ起動！花火写真に向けよう';
  })
  .catch(() => {
    document.getElementById('arSub').textContent = 'カメラの許可が必要です';
  });

// 作品を配置
const works = [];
const addedIds = new Set();

function makeCanvasTexture(color, emoji, label) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(0,0,256,256,32);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(12,12,232,232,24);
  ctx.fill();
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 128, 100);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(label, 128, 195);
  return new THREE.CanvasTexture(cv);
}

function addWork(work) {
  if(addedIds.has(work.id)) return;
  addedIds.add(work.id);

  const angle = addedIds.size * (Math.PI * 2 / 8);
  const r = 1.2;
  const x = Math.cos(angle) * r;
  const y = Math.sin(angle) * r * 0.6;

  let mesh;
  if(work.type === 'canvas') {
    const tex = makeCanvasTexture(work.color, work.emoji, work.label);
    const geo = new THREE.PlaneGeometry(0.7, 0.7);
    const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide});
    mesh = new THREE.Mesh(geo, mat);
  } else if(work.type === 'png' && work.url) {
    // HTMLのimgタグをARキャンバスに重ねて表示
    const imgEl = document.createElement('img');
    imgEl.src = work.url;
    imgEl.style.cssText = `
      position:fixed;
      width:120px;height:120px;
      object-fit:contain;
      border-radius:12px;
      border:2px solid rgba(255,255,255,0.3);
      pointer-events:none;
      z-index:5;
      transition:transform 0.1s;
    `;
    // 画面上の位置を計算（円形に配置）
    const cx = window.innerWidth/2  + x * 120;
    const cy = window.innerHeight/2 - y * 120;
    imgEl.style.left = (cx - 60) + 'px';
    imgEl.style.top  = (cy - 60) + 'px';

    // 名前タグ
    const nameEl = document.createElement('div');
    nameEl.textContent = work.name || 'なまえなし';
    nameEl.style.cssText = `
      position:fixed;
      left:${cx - 60}px;
      top:${cy + 65}px;
      width:120px;
      text-align:center;
      font-size:11px;
      color:#fff;
      background:rgba(0,0,0,0.6);
      border-radius:10px;
      padding:2px 6px;
      pointer-events:none;
      z-index:5;
    `;

    document.body.appendChild(imgEl);
    document.body.appendChild(nameEl);

    // ふわふわアニメ
    let ft = Math.random()*Math.PI*2;
    const baseTop = cy - 60;
    setInterval(() => {
      ft += 0.03;
      const offset = Math.sin(ft) * 8;
      imgEl.style.top = (baseTop + offset) + 'px';
      nameEl.style.top = (baseTop + 125 + offset) + 'px';
    }, 16);

    document.getElementById('arCount').textContent = addedIds.size + ' 作品';
    return;
  } else if(work.type === 'glb' && work.url) {
    // GLB用の独立したcanvasをオーバーレイ表示
    const glbCanvas = document.createElement('canvas');
    glbCanvas.width = 150; glbCanvas.height = 150;
    const cx2 = window.innerWidth/2 + x * 120;
    const cy2 = window.innerHeight/2 - y * 120;
    glbCanvas.style.cssText = `
      position:fixed;
      left:${cx2-75}px;
      top:${cy2-75}px;
      width:150px;height:150px;
      pointer-events:none;
      z-index:5;
      border-radius:12px;
    `;
    document.body.appendChild(glbCanvas);

    // 名前タグ
    const nameEl2 = document.createElement('div');
    nameEl2.textContent = work.name || 'なまえなし';
    nameEl2.style.cssText = `
      position:fixed;
      left:${cx2-75}px;top:${cy2+80}px;
      width:150px;text-align:center;
      font-size:11px;color:#fff;
      background:rgba(0,0,0,0.6);border-radius:10px;
      padding:2px 6px;pointer-events:none;z-index:5;
    `;
    document.body.appendChild(nameEl2);

    // Three.jsで独立レンダリング
    const glbRenderer = new THREE.WebGLRenderer({canvas:glbCanvas, alpha:true, antialias:true});
    glbRenderer.setSize(150, 150);
    glbRenderer.setClearColor(0x000000, 0);
    const glbScene = new THREE.Scene();
    const glbCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    glbCamera.position.set(0, 0, 2);
    glbScene.add(new THREE.AmbientLight(0xffffff, 2));
    const dLight = new THREE.DirectionalLight(0xffffff, 1);
    dLight.position.set(1,2,1); glbScene.add(dLight);

    const loader = new THREE.GLTFLoader();
    loader.load(work.url, (gltf) => {
      const model = gltf.scene;
      const box3 = new THREE.Box3().setFromObject(model);
      const size = box3.getSize(new THREE.Vector3());
      model.scale.setScalar(1.2 / Math.max(size.x, size.y, size.z));
      const center = box3.getCenter(new THREE.Vector3());
      model.position.sub(center);
      glbScene.add(model);

      // 回転アニメ
      let rot = 0;
      let ft2 = Math.random()*Math.PI*2;
      const baseTop2 = cy2 - 75;
      setInterval(() => {
        rot += 0.02;
        ft2 += 0.03;
        model.rotation.y = rot;
        const offset = Math.sin(ft2) * 8;
        glbCanvas.style.top = (baseTop2 + offset) + 'px';
        nameEl2.style.top = (baseTop2 + 155 + offset) + 'px';
        glbRenderer.render(glbScene, glbCamera);
      }, 16);
    }, undefined, (err) => {
      console.error('GLB load error:', err);
    });

    document.getElementById('arCount').textContent = addedIds.size + ' 作品';
    return;
  }

  if(mesh) {
    mesh.position.set(x, y, 0);
    scene.add(mesh);
    works.push({mesh, baseY: y, phase: Math.random()*Math.PI*2});
  }
  document.getElementById('arCount').textContent = addedIds.size + ' 作品';
}

// デモデータ
const DEMO = [
  {id:'d1', type:'canvas', color:'#ff6b6b', emoji:'🎆', label:'はなびだ！'},
  {id:'d2', type:'canvas', color:'#ffcc44', emoji:'🌟', label:'ほしがすき'},
  {id:'d3', type:'canvas', color:'#66dd44', emoji:'🎨', label:'えをかいたよ'},
  {id:'d4', type:'canvas', color:'#4488ff', emoji:'🌈', label:'にじいろ'},
  {id:'d5', type:'canvas', color:'#cc66ff', emoji:'🦊', label:'きつねくん'},
  {id:'d6', type:'canvas', color:'#ff88bb', emoji:'🌸', label:'はなびら'},
];
DEMO.forEach(w => addWork(w));

// Firebaseから読み込む
db.ref('works').on('child_added', (snap) => {
  const work = snap.val();
  work.id = snap.key;
  addWork(work);
});

// タップでデモ表示切り替え
let showing = true;
canvas.style.pointerEvents = 'all';
canvas.addEventListener('click', () => {
  showing = !showing;
  scene.children.forEach(c => { if(c.type === 'Mesh') c.visible = showing; });
  const st = document.getElementById('arStatus');
  if(showing) {
    st.textContent = '✨ 作品が飛び出した！';
    st.classList.add('found');
  } else {
    st.textContent = '📷 タップして作品を出す';
    st.classList.remove('found');
  }
});

document.getElementById('arStatus').textContent = '📷 画面をタップして作品を出そう！';

// レンダリング
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.02;
  works.forEach(w => {
    if(w.mesh) w.mesh.position.y = w.baseY + Math.sin(t + w.phase) * 0.06;
  });
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
