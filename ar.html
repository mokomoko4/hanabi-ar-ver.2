<script>
// ── 2D花火エフェクト ──
const fxCanvas = document.getElementById('fxCanvas');
fxCanvas.width = window.innerWidth;
fxCanvas.height = window.innerHeight;
const fx2d = fxCanvas.getContext('2d');

let audioCtx = null;
function getAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// 音量を元の30%に設定
function playBoom(vol) {
  try {
    const ctx = getAudio();
    const sr = ctx.sampleRate;
    const n = Math.floor(sr*0.5);
    const buf = ctx.createBuffer(1,n,sr);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.12));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol||0.09, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
    src.connect(g); g.connect(ctx.destination);
    src.start();
  } catch(e){}
}
function playWhistle() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime+0.45);
    g.gain.setValueAtTime(0.03, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.45);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.45);
  } catch(e){}
}

const FW_COLORS_2D = ['#ff4444','#ff8800','#ffee00','#44ff88','#4488ff','#cc44ff','#ff88cc','#44ffdd'];
const particles2D = [];

function spawnBurst(x, y, big) {
  const color = FW_COLORS_2D[Math.floor(Math.random()*FW_COLORS_2D.length)];
  const count = big ? 70 : 40;
  const maxSpeed = big ? 8 : 5;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1.5 + Math.random()*maxSpeed;
    particles2D.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      color,
      life: 1.0,
      decay: 0.012 + Math.random()*0.018,
      size: 2 + Math.random()*(big?4:2.5)
    });
  }
  playWhistle();
  setTimeout(() => playBoom(big ? 0.12 : 0.075), 420);
}

function renderFX() {
  fx2d.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  for(let i=particles2D.length-1; i>=0; i--){
    const p = particles2D[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.13;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.decay;
    if(p.life<=0){ particles2D.splice(i,1); continue; }
    fx2d.globalAlpha = p.life;
    fx2d.fillStyle = p.color;
    fx2d.beginPath();
    fx2d.arc(p.x, p.y, p.size, 0, Math.PI*2);
    fx2d.fill();
  }
  fx2d.globalAlpha = 1;
}

// 作品管理
const meshWorks = [];
const addedIds = new Set();
let worksVisible = false;

// HTMLオーバーレイ作品の情報リスト
const workItems = [];

// ===== World renderer =====
const worldCanvas = document.getElementById('worldCanvas');
const worldRenderer = new THREE.WebGLRenderer({canvas: worldCanvas, alpha:true, antialias:true});
worldRenderer.setPixelRatio(window.devicePixelRatio);
worldRenderer.setSize(window.innerWidth, window.innerHeight);
worldRenderer.setClearColor(0x000000, 0);
const worldScene = new THREE.Scene();
const worldCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
worldCamera.position.set(0,0,0);
worldScene.add(new THREE.AmbientLight(0xffffff, 2));
const worldDir = new THREE.DirectionalLight(0xffffff, 1);
worldDir.position.set(1,2,1);
worldScene.add(worldDir);

(function createStars(){
  const geo = new THREE.BufferGeometry();
  const positions = [];
  for(let i=0;i<2000;i++){
    const r = 80;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    positions.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({color:0xffffff,size:0.3,transparent:true,opacity:0.8});
  worldScene.add(new THREE.Points(geo, mat));
})();

function placeOnSphere(theta, phi, radius){
  return new THREE.Vector3(radius * Math.cos(phi) * Math.cos(theta), radius * Math.sin(phi), radius * Math.cos(phi) * Math.sin(theta));
}

function textureFromWork(work){
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(0,0,256,256,32); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.roundRect(12,12,232,232,24); ctx.fill();
  ctx.font = '80px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 128, 100);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(label, 128, 195);
  return new THREE.CanvasTexture(cv);
}

function addWork(work) {
  if(addedIds.has(work.id)) return;
  addedIds.add(work.id);

  const angle = (addedIds.size - 1) * (Math.PI * 2 / 8);
  const r = 1.2;
  const x = Math.cos(angle) * r;
  const y = Math.sin(angle) * r * 0.6;

  const cx = window.innerWidth/2  + x * 120;
  const cy = window.innerHeight/2 - y * 120;

  if(work.type === 'canvas') {
    const tex = makeCanvasTexture(work.color, work.emoji, work.label);
    const geo = new THREE.PlaneGeometry(0.7, 0.7);
    const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, 0);
    mesh.visible = false;
    scene.add(mesh);
    meshWorks.push({mesh, baseY: y, phase: Math.random()*Math.PI*2, cx, cy});

  } else if(work.type === 'png' && work.url) {
    const baseLeft = cx - 60;
    const baseTop  = cy - 60;

    const imgEl = document.createElement('img');
    imgEl.src = work.url;
    imgEl.className = 'ar-work-overlay';
    imgEl.dataset.workId = work.id;
    imgEl.dataset.height = 120;
    imgEl.style.cssText = `width:120px;height:120px;object-fit:contain;border-radius:12px;border:2px solid rgba(255,255,255,0.3);cursor:pointer;left:${baseLeft}px;top:${baseTop}px;`;

    const nameEl = document.createElement('div');
    nameEl.className = 'ar-name-tag';
    nameEl.id = 'name_' + work.id;
    nameEl.textContent = work.name || 'なまえなし';
    nameEl.style.cssText = `left:${baseLeft}px;top:${baseTop+125}px;width:120px;text-align:center;font-size:11px;color:#fff;background:rgba(0,0,0,0.6);border-radius:10px;padding:2px 6px;`;

    imgEl.addEventListener('click', e => {
      e.stopPropagation();
      const z = imgEl.dataset.zoomed === '1';
      imgEl.style.width  = z ? '120px' : '260px';
      imgEl.style.height = z ? '120px' : '260px';
      imgEl.style.zIndex = z ? '5' : '50';
      imgEl.dataset.zoomed = z ? '0' : '1';
    });

    document.body.appendChild(imgEl);
    document.body.appendChild(nameEl);

    let floatT = Math.random()*Math.PI*2;
    const item = {imgEl, nameEl, baseCx:cx, baseCy:cy, baseLeft, baseTop, floatOffset:0};
    setInterval(() => {
      floatT += 0.03;
      item.floatOffset = Math.sin(floatT) * 8;
    }, 16);
    workItems.push(item);

  } else if(work.type === 'glb' && work.url) {
    const baseLeft = cx - 75;
    const baseTop  = cy - 75;

    const mv = document.createElement('model-viewer');
    mv.setAttribute('src', work.url);
    mv.setAttribute('auto-rotate', '');
    mv.setAttribute('camera-controls', '');
    mv.className = 'ar-work-overlay';
    mv.dataset.workId = work.id;
    mv.dataset.height = 150;
    mv.style.cssText = `width:150px;height:150px;background:transparent;--poster-color:transparent;left:${baseLeft}px;top:${baseTop}px;`;

    const nameEl = document.createElement('div');
    nameEl.className = 'ar-name-tag';
    nameEl.textContent = work.name || 'なまえなし';
    nameEl.style.cssText = `left:${baseLeft}px;top:${baseTop+155}px;width:150px;text-align:center;font-size:11px;color:#fff;background:rgba(0,0,0,0.6);border-radius:10px;padding:2px 6px;`;

    document.body.appendChild(mv);
    document.body.appendChild(nameEl);

    let floatT = Math.random()*Math.PI*2;
    const item = {imgEl:mv, nameEl, baseCx:cx, baseCy:cy, baseLeft, baseTop, floatOffset:0};
    setInterval(() => {
      floatT += 0.03;
      item.floatOffset = Math.sin(floatT) * 8;
    }, 16);
    workItems.push(item);
  }

  document.getElementById('arCount').textContent = addedIds.size + ' 作品';
}

db.ref('works').on('child_added', (snap) => {
  const work = snap.val();
  work.id = snap.key;
  addWork(work);
});

// ── 作品の表示トグル ──
function showWorks() {
  worksVisible = true;
  document.getElementById('arStatus').textContent = '🎆 作品が現れた！もう一回タップで消えるよ';
  document.getElementById('arStatus').classList.add('found');

  // HTMLオーバーレイを花火バーストで出す
  workItems.forEach((item, i) => {
    setTimeout(() => {
      item.imgEl.classList.add('visible');
      item.nameEl.classList.add('visible');
      spawnBurst(item.baseCx, item.baseCy, true);
    }, i * 200);
  });

  // Three.jsメッシュも表示
  meshWorks.forEach((w, i) => {
    setTimeout(() => {
      w.mesh.visible = true;
      spawnBurst(w.cx, w.cy, true);
    }, i * 200);
  });
}

function hideWorks() {
  worksVisible = false;
  document.getElementById('arStatus').textContent = '✨ タップして作品を出そう！';
  document.getElementById('arStatus').classList.add('found');

  workItems.forEach(item => {
    item.imgEl.classList.remove('visible');
    item.nameEl.classList.remove('visible');
  });
  meshWorks.forEach(w => { w.mesh.visible = false; });
}

// ── ジャイロ（連続追跡で空間固定） ──
let gyroYaw = 0, gyroPitch = 0, prevAlpha = null;

function startGyro() {
  window.addEventListener('deviceorientation', (e) => {
    if(e.alpha === null) return;
    if(prevAlpha !== null) {
      let da = e.alpha - prevAlpha;
      if(da > 180) da -= 360;
      if(da < -180) da += 360;
      gyroYaw -= da;
    }
    prevAlpha = e.alpha;
    gyroPitch = (e.beta || 0) - 90;
  }, true);
}

if(typeof DeviceOrientationEvent !== 'undefined' &&
   typeof DeviceOrientationEvent.requestPermission === 'function') {
  const gyroBtn = document.createElement('div');
  gyroBtn.textContent = '🌀 センサーを許可';
  gyroBtn.style.cssText = `
    position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
    padding:10px 24px;border-radius:20px;
    background:rgba(255,200,60,0.2);border:1px solid rgba(255,200,60,0.5);
    color:#ffcc44;font-size:13px;cursor:pointer;z-index:200;
    font-family:'Hiragino Kaku Gothic ProN',sans-serif;
    pointer-events:all;
  `;
  gyroBtn.onclick = () => {
    DeviceOrientationEvent.requestPermission().then(state => {
      if(state === 'granted') { startGyro(); gyroBtn.remove(); }
    });
  };
  document.body.appendChild(gyroBtn);
} else {
  startGyro();
}

// ── タップ処理 ──
fxCanvas.addEventListener('click', (e) => {
  try { getAudio().resume(); } catch(err){}

  // 小さい花火を打ち上げ
  spawnBurst(e.clientX, e.clientY, false);

  // 作品トグル
  if(!worksVisible) {
    showWorks();
  } else {
    hideWorks();
  }
});

// HTMLオーバーレイをジャイロで空間固定
function updateOverlayPositions() {
  workItems.forEach(item => {
    const offsetX = gyroYaw * 4;
    const offsetY = gyroPitch * 4;
    const newLeft = item.baseLeft + offsetX;
    const newTop  = item.baseTop  + offsetY + item.floatOffset;
    item.imgEl.style.left = newLeft + 'px';
    item.imgEl.style.top  = newTop + 'px';
    item.nameEl.style.left = newLeft + 'px';
    item.nameEl.style.top  = (newTop + parseInt(item.imgEl.dataset.height||120) + 5) + 'px';
  });
}

// レンダリングループ
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.02;
  meshWorks.forEach(w => {
    if(w.mesh.visible) w.mesh.position.y = w.baseY + Math.sin(t + w.phase) * 0.06;
  });
}

function animateViewer(){
  viewerAnimId = requestAnimationFrame(animateViewer);
  if(viewerModel){
    if(state.autoRotate) viewerModel.rotation.y += 0.01;
    viewerModel.rotation.x = rotX;
    viewerModel.rotation.y += (rotY - viewerModel.rotation.y) * 0.08;
  }
  viewerRenderer?.render(viewerScene, viewerCamera);
}

function toggleAutoRotate(){
  state.autoRotate = !state.autoRotate;
  els.rotateIcon.textContent = state.autoRotate ? '⏸' : '▶';
  els.rotateLabel.textContent = state.autoRotate ? '回転停止' : '回転開始';
}

viewerCanvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
viewerCanvas.addEventListener('mousemove', e => {
  if(!isDragging) return;
  rotY += (e.clientX - lastX) * 0.01;
  rotX += (e.clientY - lastY) * 0.01;
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);
viewerCanvas.addEventListener('touchstart', e => { lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }, {passive:true});
viewerCanvas.addEventListener('touchmove', e => {
  rotY += (e.touches[0].clientX - lastX) * 0.01;
  rotX += (e.touches[0].clientY - lastY) * 0.01;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
}, {passive:true});

// ===== Fireworks =====
const fxCanvas = document.getElementById('cameraFx');
fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight;
const fx2d = fxCanvas.getContext('2d');
const particles2D = [];
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playBoom(vol = 0.3){
  try {
    const ctx = getAudio();
    const sr = ctx.sampleRate;
    const n = Math.floor(sr * 0.5);
    const buf = ctx.createBuffer(1, n, sr);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(n*0.12));
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    src.connect(g); g.connect(ctx.destination); src.start();
  } catch(e){}
}
function playWhistle(){
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.45);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.45);
  } catch(e){}
}
function spawnBurst(x, y, big = false){
  const colors = ['#ff4444','#ff8800','#ffee00','#44ff88','#4488ff','#cc44ff','#ff88cc','#44ffdd'];
  const color = colors[Math.floor(Math.random()*colors.length)];
  const count = big ? 70 : 40;
  const maxSpeed = big ? 8 : 5;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1.5 + Math.random()*maxSpeed;
    particles2D.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,color,life:1,decay:0.012+Math.random()*0.018,size:2+Math.random()*(big?4:2.5)});
  }
  playWhistle();
  setTimeout(() => playBoom(big ? 0.4 : 0.25), 420);
}
function renderFX(){
  fx2d.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  for(let i=particles2D.length-1;i>=0;i--){
    const p = particles2D[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.vx *= 0.97; p.vy *= 0.97; p.life -= p.decay;
    if(p.life <= 0){ particles2D.splice(i,1); continue; }
    fx2d.globalAlpha = p.life; fx2d.fillStyle = p.color; fx2d.beginPath(); fx2d.arc(p.x,p.y,p.size,0,Math.PI*2); fx2d.fill();
  }
  fx2d.globalAlpha = 1;
}

cameraCanvas.style.pointerEvents = 'auto';
cameraCanvas.addEventListener('click', (e) => {
  try { getAudio().resume(); } catch(err){}
  spawnBurst(e.clientX, e.clientY, false);
  setStatus('🎆 花火！', true);
  setTimeout(() => {
    if(state.mode === 'camera') setStatus('📷 カメラARモード。タップで花火！', true);
  }, 900);
});
worldCanvas.addEventListener('click', (e) => {
  try { getAudio().resume(); } catch(err){}
  spawnBurst(e.clientX, e.clientY, true);
  setStatus('🎆 ワールドに花火！', true);
});

// ===== Gyro / input =====
function startGyro(){
  state.useGyro = true;
  const zee = new THREE.Vector3(0, 0, 1);
  const euler = new THREE.Euler();
  const q0 = new THREE.Quaternion();
  const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

  window.addEventListener('deviceorientation', (e) => {
    if(e.alpha === null) return;
    if(state.baseAlpha === null) state.baseAlpha = e.alpha;
    state.gyroAlpha = ((e.alpha - state.baseAlpha) + 360) % 360;
    state.gyroBeta = e.beta || 0;

    const heading = e.webkitCompassHeading != null
      ? THREE.MathUtils.degToRad(e.webkitCompassHeading)
      : THREE.MathUtils.degToRad(360 - e.alpha);

    euler.set(THREE.MathUtils.degToRad(e.beta), THREE.MathUtils.degToRad(e.alpha), THREE.MathUtils.degToRad(-e.gamma), 'YXZ');
    worldCamera.quaternion.setFromEuler(euler);
    worldCamera.quaternion.multiply(q1);
    worldCamera.quaternion.multiply(q0.setFromAxisAngle(zee, -heading));
  }, true);
}

function requestGyroPermission(){
  DeviceOrientationEvent.requestPermission().then(stateStr => {
    els.gyroPrompt.style.display = 'none';
    if(stateStr === 'granted') startGyro();
  }).catch(() => {
    els.gyroPrompt.style.display = 'none';
  });
}

if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  els.gyroPrompt.style.display = 'flex';
} else if(typeof DeviceOrientationEvent !== 'undefined') {
  startGyro();
}

let mouseDown = false, mouseMoved = false, lastMouseX = 0, lastMouseY = 0;
worldCanvas.addEventListener('mousedown', e => { mouseDown = true; mouseMoved = false; lastMouseX = e.clientX; lastMouseY = e.clientY; });
worldCanvas.addEventListener('mousemove', e => {
  if(!mouseDown || state.useGyro) return;
  mouseMoved = true;
  state.yaw += (e.clientX - lastMouseX) * 0.005;
  state.pitch += (e.clientY - lastMouseY) * 0.003;
  state.pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, state.pitch));
  lastMouseX = e.clientX; lastMouseY = e.clientY;
});
window.addEventListener('mouseup', () => mouseDown = false);
worldCanvas.addEventListener('touchstart', e => { lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY; }, {passive:true});
worldCanvas.addEventListener('touchmove', e => {
  if(state.useGyro) return;
  state.yaw += (e.touches[0].clientX - lastMouseX) * 0.005;
  state.pitch += (e.touches[0].clientY - lastMouseY) * 0.003;
  state.pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, state.pitch));
  lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY;
}, {passive:true});

function resetView(){ state.baseAlpha = null; state.yaw = 0; state.pitch = 0; }
window.resetView = resetView;

// ===== Firebase works =====
db.ref('works').on('value', (snap) => {
  const data = snap.val() || {};
  state.works = Object.entries(data).map(([key, val]) => ({id:key, ...val}));
  if(state.works.length === 0){
    state.works = [{id:'demo1',type:'canvas',name:'デモ花火',url:'',color:'#ff6b6b'}];
  }
  els.workCount.textContent = state.works.length + ' 作品';
  if(!state.currentWork) state.currentWork = state.works[0];
  rebuildThumbs();
  rebuildWorldObjects();
  rebuildCameraOverlays();
  selectWork(state.currentWork.id);
  setStatus('✨ 作品を選ぶか、花火を打ち上げよう！', true);
});

// ===== Main loop =====
let time = 0;
function animate(now){
  requestAnimationFrame(animate);
  time += 0.016;

  if(!state.useGyro){
    worldCamera.rotation.order = 'YXZ';
    worldCamera.rotation.y = state.yaw;
    worldCamera.rotation.x = state.pitch;
  }

  state.worldObjects.forEach(({mesh}) => {
    mesh.position.y = mesh.userData.baseY + Math.sin(time * mesh.userData.floatSpeed + mesh.userData.floatPhase) * 0.15;
    mesh.lookAt(0,0,0);
  });

  cameraWorks.forEach(({mesh}) => {
    mesh.position.y = mesh.userData.baseY + Math.sin(time + mesh.userData.phase) * 0.06;
  });

  updateOverlayPositions();
  renderFX();
  if(!els.worldStage.classList.contains('hidden')) worldRenderer.render(worldScene, worldCamera);
  if(!els.cameraStage.classList.contains('hidden')) cameraRenderer.render(cameraScene, cameraThreeCamera);
}
animate();

window.addEventListener('resize', () => {
  worldCamera.aspect = window.innerWidth / window.innerHeight;
  worldCamera.updateProjectionMatrix();
  worldRenderer.setSize(window.innerWidth, window.innerHeight);
  cameraThreeCamera.aspect = window.innerWidth / window.innerHeight;
  cameraThreeCamera.updateProjectionMatrix();
  cameraRenderer.setSize(window.innerWidth, window.innerHeight);
  fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight;
  rebuildCameraOverlays();
});

updateHeader();
advanceLoading();
</script>
