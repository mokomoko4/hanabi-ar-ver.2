html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
canvas{position:fixed;inset:0;z-index:100;pointer-events:none;}

#sky{position:fixed;inset:0;z-index:0;
     background:radial-gradient(ellipse at 50% 110%, #0d0030 0%, #050018 45%, #000008 100%);}

/* スタート画面 */
#startScreen{position:fixed;inset:0;z-index:200;background:rgba(0,0,10,.93);
             display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;}
#startScreen h1{font:bold 30px/1.5 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
                color:#fff;text-align:center;letter-spacing:.1em;
                text-shadow:0 0 40px rgba(255,180,50,.9);}
#worksCount{font:14px/1.8 'Hiragino Kaku Gothic ProN',sans-serif;
            color:rgba(255,220,150,.8);letter-spacing:.06em;}
.startBtn{padding:16px 52px;border:none;border-radius:50px;
          background:linear-gradient(135deg,#ff6b00,#ffcc00);
          color:#000;font-size:18px;font-weight:900;cursor:pointer;
          font-family:'Hiragino Kaku Gothic ProN',sans-serif;letter-spacing:.1em;
          box-shadow:0 0 30px rgba(255,150,0,.6),0 4px 20px rgba(0,0,0,.4);
          transition:transform .15s,box-shadow .15s;}
.startBtn:hover{box-shadow:0 0 50px rgba(255,180,0,.8),0 4px 20px rgba(0,0,0,.4);}
.startBtn:active{transform:scale(.96);}

/* アナウンス */
#announce{position:fixed;inset:0;z-index:150;
          display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
          pointer-events:none;opacity:0;transition:opacity .5s;}
#announce.show{opacity:1;}
.ann-sub{font:15px/1 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
         color:rgba(255,210,80,.9);letter-spacing:.3em;
         text-shadow:0 0 16px rgba(255,160,0,.9);}
.ann-name{font:bold 60px/1.1 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
          color:#fff;letter-spacing:.05em;text-align:center;max-width:90vw;
          text-shadow:0 0 40px rgba(255,200,50,1),0 0 80px rgba(255,100,0,.8),0 0 130px rgba(180,60,255,.5);
          animation:ann-pulse .7s ease-in-out infinite;}
@keyframes ann-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.ann-suffix{font:30px/1 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
            color:rgba(255,220,100,.9);letter-spacing:.1em;
            text-shadow:0 0 20px rgba(255,180,0,.8);}

.ver{position:fixed;bottom:8px;right:12px;z-index:300;
     font:10px/1 monospace;color:rgba(255,255,255,.18);pointer-events:none;}
</style>

db.ref('works').on('value', snap => {

// ══════════════════════════════════════════════
// Three.js セットアップ
// ══════════════════════════════════════════════
const ren = new THREE.WebGLRenderer({alpha:true, antialias:true});
ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
ren.setSize(innerWidth, innerHeight);
ren.setClearColor(0x000000, 0);
document.body.appendChild(ren.domElement);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 500);

// ══════════════════════════════════════════════
// パーティクル GPU バッファ
// ══════════════════════════════════════════════
const MAX = 8000;
const bP = new Float32Array(MAX*3);
const bC = new Float32Array(MAX*3);
const bA = new Float32Array(MAX);
const bS = new Float32Array(MAX);
const bR = new Float32Array(MAX);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(bP,3));
geo.setAttribute('aC',       new THREE.BufferAttribute(bC,3));
geo.setAttribute('aA',       new THREE.BufferAttribute(bA,1));
geo.setAttribute('aS',       new THREE.BufferAttribute(bS,1));
geo.setAttribute('aR',       new THREE.BufferAttribute(bR,1));

const _dpr      = Math.min(window.devicePixelRatio || 1, 2);
const _isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
const _sizeBoost = _isMobile ? _dpr * 0.8 : 1.5;
const _hwc      = navigator.hardwareConcurrency || 4;
const _IMG_MAX  = _hwc <= 4 ? 500 : _hwc <= 8 ? 900 : 1400;

const mat = new THREE.ShaderMaterial({
  uniforms: {
    uSizeBoost: { value: _sizeBoost },
  },
  vertexShader:`
    uniform float uSizeBoost;
    attribute vec3 aC; attribute float aA; attribute float aS; attribute float aR;
    varying vec3 vC; varying float vA; varying float vR;
    void main(){
      vC=aC; vA=aA; vR=aR;
      vec4 mv=modelViewMatrix*vec4(position,1.);
      float lum=dot(aC,vec3(0.299,0.587,0.114));
      float szMod=0.82+lum*0.36;
      gl_PointSize=max(2.0, aS*uSizeBoost*szMod*(820.0/-mv.z));
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying vec3 vC; varying float vA; varying float vR;
    void main(){
      float d=length(gl_PointCoord-vec2(.5))*2.;
      if(vR>0.5){
        if(d>1.0) discard;
        float soft=smoothstep(1.0,0.15,d);
        float inner=smoothstep(0.45,0.0,d);
        float a=soft*vA; if(a<0.01) discard;
        vec3 col=clamp(vC*(1.0+inner*2.8),0.,1.);
        gl_FragColor=vec4(col,a);
      } else {
        float core=1.-smoothstep(.0,.22,d);
        float glow=1.-smoothstep(.0,.60,d);
        float halo=1.-smoothstep(.18,1.,d);
        float a=(core*.95+glow*.42+halo*.20)*vA; if(a<.01)discard;
        vec3 col=clamp(vC*(1.+core*4.2+glow*1.1),0.,1.);
        gl_FragColor=vec4(col,a);
      }
    }`,
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false
});
geo.setDrawRange(0,0);
const _pts = new THREE.Points(geo, mat);
_pts.frustumCulled = false;
_pts.renderOrder   = 999;
scene.add(_pts);

// ══════════════════════════════════════════════
// パーティクル状態
// ══════════════════════════════════════════════
const ps = [];
function addP(x,y,z, vx,vy,vz, r,g,b, decay, s, hold=0, round=0){
  ps.push({x,y,z,vx,vy,vz,r,g,b,a:1.0,decay,s,hold,round});
}
function addDirP(sx,sy,sz, tx,ty,tz, r,g,b, extraFrac, s, decay, round=0){
  const dx=tx-sx, dy=ty-sy, dz=tz-sz;
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.001;
  const nx=dx/len, ny=dy/len, nz=dz/len;
  const totalSpeed=(len/15.5)*(1+extraFrac);
  const vx=nx*totalSpeed+(Math.random()-.5)*0.008;
  const vy=ny*totalSpeed+(Math.random()-.5)*0.008;
  const vz=nz*totalSpeed+(Math.random()-.5)*0.008;
  addP(sx,sy,sz, vx,vy,vz, r,g,b, decay, s, 0, round);
}

function updateParticles(){
  let cnt=0;
  for(let i=ps.length-1; i>=0; i--){
    const p=ps[i];
    if(p.hold>0){ p.hold--; }
    else {
      p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
      p.vy-=0.0014;
      p.vx*=0.983; p.vy*=0.983; p.vz*=0.968;
      p.a-=p.decay;
      if(p.a<0.04){ ps[i]=ps[ps.length-1]; ps.pop(); continue; }
    }
    if(cnt>=MAX) continue;
    const effS=p.s*(0.75+p.a*0.25);
    if(effS<0.028) continue;
    bP[cnt*3]=p.x; bP[cnt*3+1]=p.y; bP[cnt*3+2]=p.z;
    bC[cnt*3]=p.r; bC[cnt*3+1]=p.g; bC[cnt*3+2]=p.b;
    bA[cnt]=p.a; bS[cnt]=effS; bR[cnt]=p.round||0;
    cnt++;
  }
  for(let j=cnt; j<Math.min(cnt+40,MAX); j++) bA[j]=0;
  geo.setDrawRange(0,cnt);
  geo.attributes.position.needsUpdate=true;
  geo.attributes.aC.needsUpdate=true;
  geo.attributes.aA.needsUpdate=true;
  geo.attributes.aS.needsUpdate=true;
  geo.attributes.aR.needsUpdate=true;
}

// ══════════════════════════════════════════════
// カラーパレット（作品なし時のフォールバック）
// ══════════════════════════════════════════════
const PALETTES = [
  [[1,.22,.05],[1,.55,.1],[1,.9,.2],[1,1,1]],
  [[.12,.38,1],[.45,.72,1],[.8,.9,1],[1,1,1]],
  [[.05,1,.28],[.55,1,.12],[1,1,.28],[1,1,1]],
  [[.88,.08,1],[1,.38,.9],[1,.72,1],[1,1,1]],
  [[1,.80,.05],[1,.92,.42],[1,1,.88],[1,1,1]],
  [[1,.15,.15],[.1,.88,1],[1,1,.32],[1,1,1]],
];

// ══════════════════════════════════════════════
// 通常爆発（フォールバック）
// ══════════════════════════════════════════════
function burst(x,y,z,pal){
  for(let i=0;i<10;i++){
    const fc=Math.random()<.5?[1,1,1]:[1,.95,.4];
    addP(x,y,z,(Math.random()-.5)*.012,(Math.random()-.5)*.012,(Math.random()-.5)*.012,
      fc[0],fc[1],fc[2],0.22+Math.random()*0.08,1.8+Math.random()*.9);
  }
  for(let i=0;i<380;i++){
    const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
    const sp=0.058+Math.random()*0.132;
    const zFwd=Math.random()<.15?0.072+Math.random()*.055:0;
    const c=pal[Math.floor(Math.random()*pal.length)];
    addP(x,y,z,Math.sin(phi)*Math.cos(theta)*sp,Math.sin(phi)*Math.sin(theta)*sp,
      Math.cos(phi)*sp*.58+zFwd,c[0],c[1],c[2],0.004+Math.random()*.006,0.65+Math.random()*.60);
  }
  for(let i=0;i<24;i++){
    addP(x,y,z,(Math.random()-.5)*.025,(Math.random()-.5)*.025,(Math.random()-.5)*.025,
      1,1,1,0.060+Math.random()*.050,0.85+Math.random()*.75);
  }
  addCenterGlow(x,y,z);
  setTimeout(()=>boom(),55);
}

// ══════════════════════════════════════════════
// 画像データ取得
// ══════════════════════════════════════════════
function makeImageData(url){
  return new Promise((resolve,reject)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      const ar=img.width/img.height;
      const PSIZ=224;
      const pc=document.createElement('canvas'); pc.width=pc.height=PSIZ;
      const pctx=pc.getContext('2d');
      let dw=PSIZ,dh=PSIZ;
      if(ar>1) dh=PSIZ/ar; else dw=PSIZ*ar;
      pctx.drawImage(img,(PSIZ-dw)/2,(PSIZ-dh)/2,dw,dh);
      const id0=pctx.getImageData(0,0,PSIZ,PSIZ); const d0=id0.data;
      function isColored(r,g,b,a){ return a>=15&&!(r>248&&g>248&&b>248); }

      let coloredCount=0;
      for(let i=0;i<d0.length;i+=4) if(isColored(d0[i],d0[i+1],d0[i+2],d0[i+3])) coloredCount++;
      const coloredRatio=coloredCount/(PSIZ*PSIZ);

      let edgeCount=0;
      for(let y=0;y<PSIZ-1;y++) for(let x=0;x<PSIZ-1;x++){
        const i=(y*PSIZ+x)*4;
        const lum=d0[i]*.299+d0[i+1]*.587+d0[i+2]*.114;
        const lumR=d0[i+4]*.299+d0[i+5]*.587+d0[i+6]*.114;
        const lumD=d0[i+PSIZ*4]*.299+d0[i+PSIZ*4+1]*.587+d0[i+PSIZ*4+2]*.114;
        if(Math.abs(lum-lumR)+Math.abs(lum-lumD)>25) edgeCount++;
      }
      const edgeDensity=edgeCount/((PSIZ-1)*(PSIZ-1));

      const cset=new Set();
      for(let i=0;i<d0.length;i+=4*6){
        if(d0[i+3]<15) continue;
        cset.add(((d0[i]>>4)<<8)|((d0[i+1]>>4)<<4)|(d0[i+2]>>4));
      }
      const colorVariety=cset.size;

      let skinCount=0;
      for(let i=0;i<d0.length;i+=4*3){
        const r=d0[i]/255,g=d0[i+1]/255,b=d0[i+2]/255;
        if(d0[i+3]<15) continue;
        if(r>.50&&g>.28&&b>.10&&r>g&&g>b&&r-b>.15&&r<.96) skinCount++;
      }
      const skinRatio=skinCount*3/(PSIZ*PSIZ);

      let mode;
      if(skinRatio>.07&&coloredRatio>.25) mode='face_portrait';
      else if(colorVariety>90&&coloredRatio>.45) mode='photo_landscape';
      else if(colorVariety<48&&edgeDensity>.06&&coloredRatio>.04&&coloredRatio<.60) mode='text_logo';
      else if(coloredRatio<.25) mode='line_art';
      else mode='illust';

      let pd, faceCX=PSIZ*.5, faceCY=PSIZ*.40, faceR=PSIZ*.32, lpData=null, lpSZ=0;

      if(mode==='photo_landscape'||mode==='face_portrait'){
        const LP=80;
        const lc=document.createElement('canvas'); lc.width=lc.height=LP;
        const lctx=lc.getContext('2d');
        let ldw=LP,ldh=LP;
        if(ar>1) ldh=Math.round(LP/ar); else ldw=Math.round(LP*ar);
        lctx.drawImage(img,(LP-ldw)/2,(LP-ldh)/2,ldw,ldh);
        lpData=lctx.getImageData(0,0,LP,LP).data; lpSZ=LP;
        if(mode==='face_portrait'){
          let sx=0,sy=0,sn=0;
          for(let y=0;y<LP;y++) for(let x=0;x<LP;x++){
            const i=(y*LP+x)*4;
            const rv=lpData[i]/255,gv=lpData[i+1]/255,bv=lpData[i+2]/255;
            if(lpData[i+3]<15) continue;
            if(rv>.50&&gv>.28&&bv>.10&&rv>gv&&gv>bv&&rv-bv>.15&&rv<.96){sx+=x;sy+=y;sn++;}
          }
          if(sn>8){
            faceCX=sx/sn; faceCY=sy/sn;
            let sr2=0;
            for(let y=0;y<LP;y++) for(let x=0;x<LP;x++){
              const i=(y*LP+x)*4;
              const rv=lpData[i]/255,gv=lpData[i+1]/255,bv=lpData[i+2]/255;
              if(lpData[i+3]<15) continue;
              if(rv>.50&&gv>.28&&bv>.10&&rv>gv&&gv>bv&&rv-bv>.15&&rv<.96)
                sr2+=(x-faceCX)**2+(y-faceCY)**2;
            }
            faceR=Math.max(8,Math.min(28,Math.sqrt(sr2/sn)*2.0));
          } else { faceCX=LP*.5; faceCY=LP*.40; faceR=LP*.32; }
        }
        pd=d0;
      } else if(mode==='line_art'||mode==='text_logo'){
        const R=0; const out=new Uint8ClampedArray(d0);
        for(let y=0;y<PSIZ;y++) for(let x=0;x<PSIZ;x++){
          const si=(y*PSIZ+x)*4;
          if(!isColored(d0[si],d0[si+1],d0[si+2],d0[si+3])) continue;
          for(let dy=-R;dy<=R;dy++) for(let dx=-R;dx<=R;dx++){
            if(dx*dx+dy*dy>R*R) continue;
            const nx=x+dx,ny=y+dy;
            if(nx<0||nx>=PSIZ||ny<0||ny>=PSIZ) continue;
            const ni=(ny*PSIZ+nx)*4;
            if(!isColored(d0[ni],d0[ni+1],d0[ni+2],d0[ni+3])){
              out[ni]=d0[si];out[ni+1]=d0[si+1];out[ni+2]=d0[si+2];out[ni+3]=d0[si+3];
            }
          }
        }
        pd=out;
      } else { pd=d0; }

      const pixels=[];
      if(mode==='line_art'){
        const edgePx=[],interPx=[];
        for(let py=0;py<PSIZ;py++) for(let lpx=0;lpx<PSIZ;lpx++){
          const i=(py*PSIZ+lpx)*4;
          if(!isColored(pd[i],pd[i+1],pd[i+2],pd[i+3])) continue;
          let onEdge=false;
          outer:for(let ky=-1;ky<=1;ky++) for(let kx=-1;kx<=1;kx++){
            if(!kx&&!ky) continue;
            const bx=lpx+kx,by=py+ky;
            if(bx<0||bx>=PSIZ||by<0||by>=PSIZ){onEdge=true;break outer;}
            const ni=(by*PSIZ+bx)*4;
            if(!isColored(pd[ni],pd[ni+1],pd[ni+2],pd[ni+3])){onEdge=true;break outer;}
          }
          const pobj={nx:(lpx/PSIZ)*2-1,ny:(py/PSIZ)*2-1,r:pd[i]/255,g:pd[i+1]/255,b:pd[i+2]/255};
          if(onEdge) edgePx.push(pobj);
          else if((py&1)===0&&(lpx&1)===0) interPx.push(pobj);
        }
        edgePx.sort(()=>Math.random()-.5); interPx.sort(()=>Math.random()-.5);
        pixels.push(...edgePx.slice(0,1400),...interPx.slice(0,600));
        pixels.sort(()=>Math.random()-.5); if(pixels.length>2000) pixels.length=2000;
      } else if(mode==='text_logo'){
        const edgePx=[],interPx=[];
        for(let py=0;py<PSIZ;py++) for(let lpx=0;lpx<PSIZ;lpx++){
          const i=(py*PSIZ+lpx)*4;
          if(!isColored(pd[i],pd[i+1],pd[i+2],pd[i+3])) continue;
          let onEdge=false;
          outer:for(let ky=-1;ky<=1;ky++) for(let kx=-1;kx<=1;kx++){
            if(!kx&&!ky) continue;
            const bx=lpx+kx,by=py+ky;
            if(bx<0||bx>=PSIZ||by<0||by>=PSIZ){onEdge=true;break outer;}
            const ni=(by*PSIZ+bx)*4;
            if(!isColored(pd[ni],pd[ni+1],pd[ni+2],pd[ni+3])){onEdge=true;break outer;}
          }
          const pobj={nx:(lpx/PSIZ)*2-1,ny:(py/PSIZ)*2-1,r:pd[i]/255,g:pd[i+1]/255,b:pd[i+2]/255};
          if(onEdge) edgePx.push(pobj); else interPx.push(pobj);
        }
        edgePx.sort(()=>Math.random()-.5); interPx.sort(()=>Math.random()-.5);
        pixels.push(...edgePx.slice(0,1500),...interPx.slice(0,1500));
        pixels.sort(()=>Math.random()-.5); if(pixels.length>2500) pixels.length=2500;
      } else if(mode==='photo_landscape'){
        const P4=64,p4v=v=>Math.floor(v/P4)*P4+(P4>>1);
        const cmap=new Map();
        for(let y=0;y<lpSZ;y++) for(let x=0;x<lpSZ;x++){
          const i=(y*lpSZ+x)*4; if(lpData[i+3]<15) continue;
          const r=p4v(lpData[i]),g=p4v(lpData[i+1]),b=p4v(lpData[i+2]);
          if(r>245&&g>245&&b>245) continue;
          const key=(r<<16)|(g<<8)|b; cmap.set(key,(cmap.get(key)||0)+1);
        }
        const topColors=new Set([...cmap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k])=>k));
        for(let y=0;y<lpSZ;y+=2) for(let x=0;x<lpSZ;x+=2){
          const nx=(x/lpSZ)*2-1,ny=(y/lpSZ)*2-1;
          const dist=Math.sqrt(nx*nx+ny*ny); if(dist>1.0) continue;
          const t=Math.max(0,Math.min(1,(dist-1.0)/(0.2-1.0)));
          if(Math.random()>t*t*(3-2*t)*.75) continue;
          const i=(y*lpSZ+x)*4; if(lpData[i+3]<15) continue;
          const r=p4v(lpData[i]),g=p4v(lpData[i+1]),b=p4v(lpData[i+2]);
          if(r>245&&g>245&&b>245) continue;
          if(!topColors.has((r<<16)|(g<<8)|b)) continue;
          pixels.push({nx,ny,r:r/255,g:g/255,b:b/255});
        }
        if(pixels.length>700){pixels.sort(()=>Math.random()-.5);pixels.length=700;}
      } else if(mode==='face_portrait'){
        const P4=64,p4v=v=>Math.floor(v/P4)*P4+(P4>>1);
        const FNORM=faceR*1.4,FACE_THRESH=faceR*1.8;
        const cmap=new Map();
        for(let y=0;y<lpSZ;y++) for(let x=0;x<lpSZ;x++){
          const i=(y*lpSZ+x)*4; if(lpData[i+3]<15) continue;
          const r=p4v(lpData[i]),g=p4v(lpData[i+1]),b=p4v(lpData[i+2]);
          if(r>245&&g>245&&b>245) continue;
          const key=(r<<16)|(g<<8)|b; cmap.set(key,(cmap.get(key)||0)+1);
        }
        const topColors=new Set([...cmap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k])=>k));
        for(let y=0;y<lpSZ;y++) for(let x=0;x<lpSZ;x++){
          const i=(y*lpSZ+x)*4; if(lpData[i+3]<15) continue;
          const r=p4v(lpData[i]),g=p4v(lpData[i+1]),b=p4v(lpData[i+2]);
          if(r>245&&g>245&&b>245) continue;
          if(!topColors.has((r<<16)|(g<<8)|b)) continue;
          const dfx=x-faceCX,dfy=y-faceCY;
          const inFace=Math.sqrt(dfx*dfx+dfy*dfy)<FACE_THRESH;
          const nx=Math.max(-1.5,Math.min(1.5,dfx/FNORM));
          const ny=Math.max(-1.5,Math.min(1.5,dfy/FNORM));
          const normDist=Math.sqrt(nx*nx+ny*ny);
          if(normDist>(inFace?1.3:1.0)) continue;
          if(!(inFace?Math.random()<.72:Math.random()<.18)) continue;
          pixels.push({nx,ny,r:r/255,g:g/255,b:b/255});
        }
        if(pixels.length>700){pixels.sort(()=>Math.random()-.5);pixels.length=700;}
      } else {
        const edgePx=[],interPx=[];
        const _edx=[2,-2,0,0],_edy=[0,0,2,-2];
        for(let py=0;py<PSIZ;py+=2) for(let lpx=0;lpx<PSIZ;lpx+=2){
          const nx=(lpx/PSIZ)*2-1,ny=(py/PSIZ)*2-1;
          const dist=Math.sqrt(nx*nx+ny*ny); if(dist>1.0) continue;
          const t=Math.max(0,Math.min(1,(dist-1.0)/(0.2-1.0)));
          if(Math.random()>t*t*(3-2*t)) continue;
          const i=(py*PSIZ+lpx)*4;
          const r=pd[i],g=pd[i+1],b=pd[i+2],a=pd[i+3];
          if(!isColored(r,g,b,a)) continue;
          const lum=r*.299+g*.587+b*.114;
          let onEdge=false;
          for(let c=0;c<4;c++){
            const bx=lpx+_edx[c],by=py+_edy[c];
            if(bx<0||bx>=PSIZ||by<0||by>=PSIZ){onEdge=true;break;}
            const ni=(by*PSIZ+bx)*4;
            if(!isColored(pd[ni],pd[ni+1],pd[ni+2],pd[ni+3])||
               Math.abs(lum-(pd[ni]*.299+pd[ni+1]*.587+pd[ni+2]*.114))>40){onEdge=true;break;}
          }
          (onEdge?edgePx:interPx).push({nx,ny,r:r/255,g:g/255,b:b/255});
        }
        interPx.sort(()=>Math.random()-.5);
        pixels.push(...edgePx,...interPx.slice(0,Math.floor(interPx.length*.35)));
        if(pixels.length>_IMG_MAX){pixels.sort(()=>Math.random()-.5);pixels.length=_IMG_MAX;}
      }
      resolve({pixels,mode});
    };
    img.onerror=reject; img.src=url;
  });
}

// ══════════════════════════════════════════════
// 画像形状パーティクル
// ══════════════════════════════════════════════
const SHAPE_SCALE=7.0;
const _DARK_PAL=[
  [1.00,.86,.47],[1.00,.63,.31],[1.00,.47,.71],[.63,.86,1.00],[1.00,1.00,.90],
];
function mapFireworkColor(r,g,b){
  const br=r*.299+g*.587+b*.114;
  if(br<.24) return _DARK_PAL[Math.floor(Math.random()*_DARK_PAL.length)];
  const boost=br<.55?1.35:1.0;
  return [Math.min(1,r*boost+.10),Math.min(1,g*boost+.10),Math.min(1,b*boost+.10)];
}
function addCenterGlow(x,y,z){
  for(let i=0;i<5;i++){
    const r2=Math.random()*.14;
    const gc=Math.random()<.5?[1,.95,.55]:[1,1,1];
    addP(x,y,z,(Math.random()-.5)*r2,(Math.random()-.5)*r2,(Math.random()-.5)*r2,
      gc[0],gc[1],gc[2],0.020+Math.random()*.008,0.9+Math.random()*.6);
  }
}
function showImageParticleShape(center,pixels,snapRight,snapUp,mode='illust'){
  const HALF=SHAPE_SCALE*.5;
  const szB=(mode==='line_art')?1.5:(mode==='text_logo')?1.4:(mode==='face_portrait')?1.0:(mode==='photo_landscape')?.85:1.0;
  const isPhotoMode=(mode==='photo_landscape'||mode==='face_portrait');
  const pixCap=isPhotoMode?Math.floor(_IMG_MAX*.40):_IMG_MAX;
  const pxLen=Math.min(pixels.length,pixCap);
  for(let _pi=0;_pi<pxLen;_pi++){
    const px=pixels[_pi];
    const tx=center.x+snapRight.x*px.nx*HALF+snapUp.x*(-px.ny)*HALF;
    const ty=center.y+snapRight.y*px.nx*HALF+snapUp.y*(-px.ny)*HALF;
    const tz=center.z+snapRight.z*px.nx*HALF+snapUp.z*(-px.ny)*HALF;
    const dist=Math.sqrt(px.nx*px.nx+px.ny*px.ny);
    const extraFrac=0.8+dist*0.5+Math.random()*0.6;
    let cr,cg,cb;
    if(mode==='face_portrait'){
      const brF=px.r*.299+px.g*.587+px.b*.114;
      const bst=brF<.30?2.8:brF<.55?1.45:1.20;
      cr=Math.min(1,px.r*bst+.04);cg=Math.min(1,px.g*bst+.02);cb=Math.min(1,px.b*bst+.02);
    } else {
      [cr,cg,cb]=mapFireworkColor(px.r,px.g,px.b);
      if(mode==='text_logo'){
        cr=Math.min(1,cr*1.20+.06);cg=Math.min(1,cg*1.20+.06);cb=Math.min(1,cb*1.20+.06);
      }
    }
    const pSize=isPhotoMode?(0.03+Math.random()*.045)*szB:(0.035+Math.random()*.025)*szB;
    addDirP(center.x,center.y,center.z,tx,ty,tz,cr,cg,cb,extraFrac,pSize,
      0.004+Math.random()*.003,isPhotoMode?1:0);
  }
  for(let i=0;i<2;i++){
    addP(center.x,center.y,center.z,
      (Math.random()-.5)*.008,(Math.random()-.5)*.008,(Math.random()-.5)*.008,
      1,1,1,0.12+Math.random()*.06,0.35+Math.random()*.20);
  }
  addCenterGlow(center.x,center.y,center.z);
}

// ══════════════════════════════════════════════
// ロケット
// ══════════════════════════════════════════════
const rockets=[];
function launchVector(start,end,pal,onBurst=null){
  const dir=end.clone().sub(start).normalize();
  rockets.push({start:start.clone(),end:end.clone(),dir,
                pos:new THREE.Vector3(),t:0,pal,trail:0,onBurst});
  whistle();
}
function updateRockets(){
  for(let i=rockets.length-1;i>=0;i--){
    const r=rockets[i];
    r.t=Math.min(1,r.t+0.017);
    const e=r.t<.5?2*r.t*r.t:1-(-2*r.t+2)**2/2;
    r.pos.lerpVectors(r.start,r.end,e);
    r.trail++;
    if(r.trail%2===0){
      const tv=0.016+Math.random()*.012;
      for(let k=0;k<3;k++){
        addP(r.pos.x+(Math.random()-.5)*.06,r.pos.y+(Math.random()-.5)*.06,r.pos.z+(Math.random()-.5)*.06,
          -r.dir.x*tv+(Math.random()-.5)*.008,-r.dir.y*tv+(Math.random()-.5)*.008,-r.dir.z*tv+(Math.random()-.5)*.008,
          1,0.82+Math.random()*.18,0.3+Math.random()*.3,0.048+Math.random()*.05,0.18+Math.random()*.14);
      }
      addP(r.pos.x,r.pos.y,r.pos.z,0,0,0,1,1,1,0.55,0.42);
    }
    if(r.t>=1){
      if(r.onBurst) r.onBurst(r.pos.clone());
      else burst(r.pos.x,r.pos.y,r.pos.z,r.pal||PALETTES[Math.floor(Math.random()*PALETTES.length)]);
      rockets.splice(i,1);
    }
  }
}

// ══════════════════════════════════════════════
// スクリーンモード：固定カメラ（ジャイロなし）
// ══════════════════════════════════════════════
function updateCamera(){
  cam.rotation.order='YXZ';
  cam.rotation.set(-0.25,0,0);
}

// ══════════════════════════════════════════════
// アナウンス
// ══════════════════════════════════════════════
function showAnnouncement(name){
  document.getElementById('annName').textContent=name;
  const el=document.getElementById('announce');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ══════════════════════════════════════════════
// 自動打ち上げ
// ══════════════════════════════════════════════
let _workIndex=0;
let _autoScheduled=false;
let _lastXOff=0;
const SNAP_RIGHT=new THREE.Vector3(1,0,0);
const SNAP_UP   =new THREE.Vector3(0,1,0);

function scheduleNextLaunch(ms){
  if(_autoScheduled) return;
  _autoScheduled=true;
  setTimeout(()=>{ _autoScheduled=false; triggerNextFirework(); },ms);
}

function triggerNextFirework(){
  // 直前の位置から最低7ユニット離れた位置を選ぶ
  let xOff;
  do { xOff=(Math.random()-.5)*18; } while(Math.abs(xOff-_lastXOff)<7);
  _lastXOff=xOff;
  const zDist=-14;
  const bPos =new THREE.Vector3(xOff, -1+Math.random()*3, zDist);
  const lPos =new THREE.Vector3(xOff+(Math.random()-.5)*1.5, -8, zDist);

  if(works.length===0){
    launchVector(lPos,bPos,PALETTES[Math.floor(Math.random()*PALETTES.length)],null);
    scheduleNextLaunch(5000);
    return;
  }

  const work=works[_workIndex%works.length];
  _workIndex++;
  showAnnouncement(work.name||'みんなの花火');

  const fire=(imgData)=>{
    launchVector(lPos,bPos,null,burstPos=>{
      setTimeout(()=>boom(),55);
      if(imgData&&imgData.pixels&&imgData.pixels.length>0){
        showImageParticleShape(burstPos,imgData.pixels,SNAP_RIGHT,SNAP_UP,imgData.mode);
      }
    });
    scheduleNextLaunch(7500);
  };

  setTimeout(()=>{
    const cached=imageCache[work.url];
    if(cached){ fire(cached); return; }
    makeImageData(work.url)
      .then(d=>{ imageCache[work.url]=d; fire(d); })
      .catch(()=>fire(null));
  },1800);
}

// ══════════════════════════════════════════════
// スタート（AudioContext 初期化 + ショー開始）
// ══════════════════════════════════════════════
function startShow(){
  document.getElementById('startScreen').style.display='none';
  try{ getAu(); }catch(_){}
  setTimeout(()=>triggerNextFirework(),800);
}

// ══════════════════════════════════════════════
// オーディオ
// ══════════════════════════════════════════════
let audioCtx=null;
function getAu(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume(); return audioCtx;
}
function whistle(){
  try{
    const ctx=getAu(),now=ctx.currentTime,sr=ctx.sampleRate,dur=1.85;
    const nb=Math.floor(sr*.07),bb=ctx.createBuffer(1,nb,sr),db_=bb.getChannelData(0);
    for(let i=0;i<nb;i++) db_[i]=(Math.random()*2-1)*Math.exp(-i/(nb*.14));
    const sb=ctx.createBufferSource(); sb.buffer=bb;
    const lpb=ctx.createBiquadFilter(); lpb.type='lowpass'; lpb.frequency.value=200; lpb.Q.value=4.0;
    const gb=ctx.createGain(); gb.gain.setValueAtTime(.21,now); gb.gain.exponentialRampToValueAtTime(.001,now+.12);
    sb.connect(lpb); lpb.connect(gb); gb.connect(ctx.destination); sb.start(now);
    const o1=ctx.createOscillator(); o1.type='sine';
    o1.frequency.setValueAtTime(4200,now+.02); o1.frequency.exponentialRampToValueAtTime(2400,now+dur);
    const g1=ctx.createGain();
    g1.gain.setValueAtTime(.001,now); g1.gain.linearRampToValueAtTime(.10,now+.07);
    g1.gain.setValueAtTime(.10,now+dur*.84); g1.gain.exponentialRampToValueAtTime(.001,now+dur);
    o1.connect(g1); g1.connect(ctx.destination); o1.start(now); o1.stop(now+dur+.05);
    const o2=ctx.createOscillator(); o2.type='sine';
    o2.frequency.setValueAtTime(4212,now+.02); o2.frequency.exponentialRampToValueAtTime(2412,now+dur);
    const g2=ctx.createGain();
    g2.gain.setValueAtTime(.001,now); g2.gain.linearRampToValueAtTime(.05,now+.09);
    g2.gain.setValueAtTime(.05,now+dur*.80); g2.gain.exponentialRampToValueAtTime(.001,now+dur);
    o2.connect(g2); g2.connect(ctx.destination); o2.start(now+.01); o2.stop(now+dur+.05);
    const nLen=Math.floor(sr*dur),nBuf=ctx.createBuffer(1,nLen,sr),nd=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++) nd[i]=Math.random()*2-1;
    const nSrc=ctx.createBufferSource(); nSrc.buffer=nBuf;
    const bpf=ctx.createBiquadFilter(); bpf.type='bandpass';
    bpf.frequency.setValueAtTime(2000,now); bpf.frequency.exponentialRampToValueAtTime(600,now+dur); bpf.Q.value=1.2;
    const gn=ctx.createGain();
    gn.gain.setValueAtTime(.001,now); gn.gain.linearRampToValueAtTime(.019,now+.06);
    gn.gain.setValueAtTime(.019,now+dur*.65); gn.gain.exponentialRampToValueAtTime(.001,now+dur);
    nSrc.connect(bpf); bpf.connect(gn); gn.connect(ctx.destination); nSrc.start(now); nSrc.stop(now+dur);
  }catch(_){}
}
function boom(){
  try{
    const ctx=getAu(),sr=ctx.sampleRate,now=ctx.currentTime,vol=0.16;
    const n1=Math.floor(sr*.14),buf1=ctx.createBuffer(1,n1,sr),d1=buf1.getChannelData(0);
    for(let i=0;i<n1;i++) d1[i]=(Math.random()*2-1)*Math.exp(-i/(n1*.055));
    const src1=ctx.createBufferSource(); src1.buffer=buf1;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=700;
    const g1=ctx.createGain();
    g1.gain.setValueAtTime(vol*1.2,now); g1.gain.exponentialRampToValueAtTime(.001,now+.14);
    src1.connect(hpf); hpf.connect(g1); g1.connect(ctx.destination); src1.start(now);
    const d2st=now+.14+Math.random()*.07;
    const n2=Math.floor(sr*2.0),buf2=ctx.createBuffer(1,n2,sr),d2=buf2.getChannelData(0);
    for(let i=0;i<n2;i++) d2[i]=(Math.random()*2-1)*Math.exp(-i/(n2*.20));
    const src2=ctx.createBufferSource(); src2.buffer=buf2;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=200; lpf.Q.value=1.5;
    const ws=ctx.createWaveShaper();
    const wc=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2/255)-1; wc[i]=(3*x)/(2*(1+Math.abs(2.2*x)));}
    ws.curve=wc; ws.oversample='2x';
    const g2=ctx.createGain();
    g2.gain.setValueAtTime(.001,d2st); g2.gain.linearRampToValueAtTime(vol*.88,d2st+.06);
    g2.gain.exponentialRampToValueAtTime(.001,d2st+1.9);
    const dly=ctx.createDelay(.5); dly.delayTime.value=.058;
    const fb=ctx.createGain(); fb.gain.value=.24;
    const rv=ctx.createGain(); rv.gain.value=.20;
    src2.connect(lpf); lpf.connect(ws); ws.connect(g2);
    g2.connect(ctx.destination);
    g2.connect(dly); dly.connect(fb); fb.connect(dly);
    fb.connect(rv); rv.connect(ctx.destination);
    src2.start(d2st);
  }catch(_){}
}

// ══════════════════════════════════════════════
// メインループ
// ══════════════════════════════════════════════
function tick(){
  updateCamera();
  updateRockets();
  updateParticles();
}
function animate(){
  requestAnimationFrame(animate);
  tick();
  ren.render(scene,cam);
}
animate();

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  ren.setSize(innerWidth,innerHeight);
});
</script>
