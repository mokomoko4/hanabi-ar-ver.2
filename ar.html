// ══════════════════════════════════════════════
// 打ち上げ方向インジケーター
// ══════════════════════════════════════════════

const arrowHelper = new THREE.ArrowHelper(
  new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0),
  8, 0xffcc00, 1.0, 0.5
);
arrowHelper.line.material.blending    = THREE.AdditiveBlending;
arrowHelper.line.material.transparent = true;
arrowHelper.cone.material.blending    = THREE.AdditiveBlending;
arrowHelper.cone.material.transparent = true;
arrowHelper.visible = false;
scene.add(arrowHelper);

let arrowFrames = 0;
const launchDirEl = document.getElementById('launchDir');

function showLaunchIndicator(start, end){
  const dir = end.clone().sub(start).normalize();
  const len = start.distanceTo(end);
  arrowHelper.position.copy(start);
  arrowHelper.setDirection(dir);
  arrowHelper.setLength(len, Math.min(1.2,len*.15), Math.min(0.55,len*.07));
  arrowHelper.visible = true;
  arrowHelper.line.material.opacity = 0.85;
  arrowHelper.cone.material.opacity = 0.85;
  arrowFrames = 100;
  launchDirEl.classList.add('show');
}

function updateArrowIndicator(){
  if(arrowFrames <= 0){
    arrowHelper.visible = false;
    launchDirEl.classList.remove('show');
    return;
  }
  arrowFrames--;
  const t = arrowFrames / 100;
  arrowHelper.line.material.opacity = 0.85 * t;
  arrowHelper.cone.material.opacity = 0.85 * t;
}

// ══════════════════════════════════════════════
// パーティクル GPU バッファ
// ══════════════════════════════════════════════

const MAX = 8000;
const bP = new Float32Array(MAX*3);
const bC = new Float32Array(MAX*3);
const bA = new Float32Array(MAX);
const bS = new Float32Array(MAX);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(bP,3));
geo.setAttribute('aC',       new THREE.BufferAttribute(bC,3));
geo.setAttribute('aA',       new THREE.BufferAttribute(bA,1));
geo.setAttribute('aS',       new THREE.BufferAttribute(bS,1));

// モバイル判定 + DPR 補正サイズブースト
const _dpr      = Math.min(window.devicePixelRatio || 1, 3);
const _isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
const _sizeBoost = _isMobile ? _dpr * 3.2 : 1.5;

const mat = new THREE.ShaderMaterial({
  uniforms: { uSizeBoost: { value: _sizeBoost } },
  vertexShader:`
    uniform float uSizeBoost;
    attribute vec3 aC;
    attribute float aA;
    attribute float aS;
    varying vec3 vC; varying float vA;
    void main(){
      vC=aC; vA=aA;
      vec4 mv=modelViewMatrix*vec4(position,1.);
      // 輝度が高い粒子ほど少し大きく（発光感）
      float lum=dot(aC,vec3(0.299,0.587,0.114));
      float szMod=0.82+lum*0.36;
      gl_PointSize=max(10.0, aS*uSizeBoost*szMod*(820.0/-mv.z));
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying vec3 vC; varying float vA;
    void main(){
      float d=length(gl_PointCoord-vec2(.5))*2.;
      float core=1.-smoothstep(.0,.22,d);
      float glow=1.-smoothstep(.0,.60,d);
      float halo=1.-smoothstep(.18,1.,d);
      float a=(core*.95+glow*.42+halo*.20)*vA;
      if(a<.01)discard;
      vec3 col=clamp(vC*(1.+core*4.2+glow*1.1),0.,1.);
      gl_FragColor=vec4(col,a);
    }`,
  transparent:true, blending:THREE.AdditiveBlending,
  depthWrite:false, depthTest:false
});
geo.setDrawRange(0,0);
const _pts = new THREE.Points(geo, mat);
_pts.frustumCulled = false;
_pts.renderOrder   = 999;
scene.add(_pts);

// ══════════════════════════════════════════════
// パーティクル状態配列
// hold > 0 の間はその場に静止し、0になって初めて飛散・フェードを開始
// ══════════════════════════════════════════════

const ps = [];
function addP(x,y,z, vx,vy,vz, r,g,b, decay, s, hold=0){
  ps.push({x,y,z,vx,vy,vz,r,g,b,a:1.0,decay,s,hold});
}

// 画像形状用：center→target を通過して外側へ飛び続ける粒子
// ドラッグ 0.983 下で ~18フレームで target に到達する速度を初速とし、
// easeOut しないので target付近で止まらず、そのまま抜けて外側へ飛ぶ。
// DRAG_FACTOR = sum(0.983^i, i=0..17) = (1-0.983^18)/0.017 ≈ 15.5
function addDirP(sx,sy,sz, tx,ty,tz, r,g,b, extraSpeed, s, decay){
  const dx=tx-sx, dy=ty-sy, dz=tz-sz;
  const len = Math.sqrt(dx*dx+dy*dy+dz*dz) || 0.001;
  const nx=dx/len, ny=dy/len, nz=dz/len;
  const throughSpeed = len / 15.5; // ~18フレームで target を通過する最低速度
  const totalSpeed   = throughSpeed + extraSpeed;
  addP(sx,sy,sz,
    nx*totalSpeed + (Math.random()-.5)*0.012,
    ny*totalSpeed + (Math.random()-.5)*0.012,
    nz*totalSpeed + (Math.random()-.5)*0.012,
    r,g,b, decay, s);
}

function updateParticles(){
  let cnt = 0;
  for(let i=ps.length-1; i>=0; i--){
    const p = ps[i];
    if(p.hold > 0){
      p.hold--;
    } else {
      p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
      p.vy -= 0.0028;
      p.vx *= 0.983; p.vy *= 0.983; p.vz *= 0.968;
      p.a  -= p.decay;
      if(p.a <= 0){ ps.splice(i,1); continue; }
    }
    if(cnt >= MAX) continue;
    bP[cnt*3]=p.x; bP[cnt*3+1]=p.y; bP[cnt*3+2]=p.z;
    bC[cnt*3]=p.r; bC[cnt*3+1]=p.g; bC[cnt*3+2]=p.b;
    bA[cnt]=p.a;   bS[cnt]=p.s*Math.max(0.12, p.a*1.05);
    cnt++;
  }
  for(let j=cnt; j<Math.min(cnt+40,MAX); j++) bA[j]=0;
  geo.setDrawRange(0,cnt);
  geo.attributes.position.needsUpdate=true;
  geo.attributes.aC.needsUpdate=true;
  geo.attributes.aA.needsUpdate=true;
  geo.attributes.aS.needsUpdate=true;
}

// ══════════════════════════════════════════════
// カラーパレット（画像なし時のフォールバック）
// ══════════════════════════════════════════════

const PALETTES = [
  [[1,.22,.05],[1,.55,.1],[1,.9,.2],[1,1,1]],
  [[.12,.38,1],[.45,.72,1],[.8,.9,1],[1,1,1]],
  [[.05,1,.28],[.55,1,.12],[1,1,.28],[1,1,1]],
  [[.88,.08,1],[1,.38,.9],[1,.72,1],[1,1,1]],
  [[1,.80,.05],[1,.92,.42],[1,1,.88],[1,1,1]],
  [[1,.15,.15],[.1,.88,1],[1,1,.32],[1,1,1]],
];

// ══════════════════════════════════════════════
// 通常爆発（フォールバック）
// ══════════════════════════════════════════════

function burst(x, y, z, pal){
  // 中心閃光：極短命の白〜黄大粒子
  for(let i=0; i<10; i++){
    const flashC = Math.random()<0.5 ? [1,1,1] : [1,0.95,0.4];
    addP(x,y,z,
      (Math.random()-.5)*.012,(Math.random()-.5)*.012,(Math.random()-.5)*.012,
      flashC[0],flashC[1],flashC[2], 0.22+Math.random()*0.08, 1.8+Math.random()*0.9);
  }
  // メイン爆発粒子
  for(let i=0; i<380; i++){
    const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
    const sp=0.058+Math.random()*0.132;
    const zFwd=(Math.random()<0.15)?0.072+Math.random()*0.055:0;
    const c=pal[Math.floor(Math.random()*pal.length)];
    addP(x,y,z,
      Math.sin(phi)*Math.cos(theta)*sp,
      Math.sin(phi)*Math.sin(theta)*sp,
      Math.cos(phi)*sp*0.58+zFwd,
      c[0],c[1],c[2], 0.004+Math.random()*0.006, 0.65+Math.random()*0.60);
  }
  // 白フラッシュ
  for(let i=0; i<24; i++){
    addP(x,y,z,
      (Math.random()-.5)*.025,(Math.random()-.5)*.025,(Math.random()-.5)*.025,
      1,1,1, 0.060+Math.random()*0.050, 0.85+Math.random()*0.75);
  }
  // 中心残光（0.8秒間、見失い防止）
  addCenterGlow(x, y, z);
  setTimeout(()=>boom(), 55);
}

// ══════════════════════════════════════════════
// 画像データ取得（表示用テクスチャ + 散布用ピクセル）
// ══════════════════════════════════════════════

function makeImageData(url){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const ar = img.width / img.height;
      const PSIZ = 128;
      const pc = document.createElement('canvas');
      pc.width = pc.height = PSIZ;
      const pctx = pc.getContext('2d');
      let dw=PSIZ, dh=PSIZ;
      if(ar>1) dh=PSIZ/ar; else dw=PSIZ*ar;
      pctx.drawImage(img,(PSIZ-dw)/2,(PSIZ-dh)/2,dw,dh);

      const id0 = pctx.getImageData(0,0,PSIZ,PSIZ);
      const d0  = id0.data;

      // 有色ピクセル判定（白・透明を背景扱い）
      function isColored(r,g,b,a){
        return a>=20 && !(r>245&&g>245&&b>245);
      }

      // 有色率で線画か判定
      let coloredCount=0;
      for(let i=0;i<d0.length;i+=4){
        if(isColored(d0[i],d0[i+1],d0[i+2],d0[i+3])) coloredCount++;
      }
      const isLineArt = (coloredCount/(PSIZ*PSIZ)) < 0.18;

      // 線画のみ: 円形 dilation（半径3）で線を太らせる
      let pd = d0;
      if(isLineArt){
        const R=3, out=new Uint8ClampedArray(d0);
        for(let y=0;y<PSIZ;y++){
          for(let x=0;x<PSIZ;x++){
            const si=(y*PSIZ+x)*4;
            if(!isColored(d0[si],d0[si+1],d0[si+2],d0[si+3])) continue;
            for(let dy=-R;dy<=R;dy++){
              for(let dx=-R;dx<=R;dx++){
                if(dx*dx+dy*dy>R*R) continue;
                const nx=x+dx, ny=y+dy;
                if(nx<0||nx>=PSIZ||ny<0||ny>=PSIZ) continue;
                const ni=(ny*PSIZ+nx)*4;
                // 隣が背景のときだけ塗る（既存の有色ピクセルは保護）
                if(!isColored(d0[ni],d0[ni+1],d0[ni+2],d0[ni+3])){
                  out[ni]=d0[si]; out[ni+1]=d0[si+1];
                  out[ni+2]=d0[si+2]; out[ni+3]=d0[si+3];
                }
              }
            }
          }
        }
        pd = out;
      }

      // ピクセルサンプリング（step=2）
      const pixels=[];
      for(let py=0;py<PSIZ;py+=2){
        for(let px=0;px<PSIZ;px+=2){
          const i=(py*PSIZ+px)*4;
          const r=pd[i],g=pd[i+1],b=pd[i+2],a=pd[i+3];
          if(!isColored(r,g,b,a)) continue;
          pixels.push({nx:(px/PSIZ)*2-1, ny:(py/PSIZ)*2-1, r:r/255, g:g/255, b:b/255});
        }
      }
      if(pixels.length>900){pixels.sort(()=>Math.random()-.5); pixels.length=900;}

      resolve({pixels, isLineArt});
    };
    img.onerror=reject;
    img.src=url;
  });
}

// ══════════════════════════════════════════════
// 画像形状パーティクル
// center から出発 → ~0.3秒で形成位置（通過点）を抜ける → そのまま外へ飛散
// easeOut・hold・停止は一切なし
// ══════════════════════════════════════════════

const SHAPE_SCALE = 5.0; // ワールド幅 [m]

// 爆発中心に0.5秒残る残光グロー（見失い防止）
function addCenterGlow(x, y, z){
  for(let i=0; i<10; i++){
    const r2 = Math.random()*0.18;
    const gc = Math.random()<0.5 ? [1,0.95,0.55] : [1,1,1];
    addP(x,y,z,
      (Math.random()-.5)*r2,(Math.random()-.5)*r2,(Math.random()-.5)*r2,
      gc[0],gc[1],gc[2],
      0.024+Math.random()*0.008, // decay ~0.5s
      2.8+Math.random()*1.8);
  }
}

function showImageParticleShape(center, pixels, snapRight, snapUp, isLineArt=false){
  const HALF = SHAPE_SCALE * 0.5;
  const szB  = isLineArt ? 1.4 : 1.0;
  for(const px of pixels){
    // target = 画像ピクセルのワールド座標（通過点）
    const tx = center.x + snapRight.x*px.nx*HALF + snapUp.x*(-px.ny)*HALF;
    const ty = center.y + snapRight.y*px.nx*HALF + snapUp.y*(-px.ny)*HALF;
    const tz = center.z + snapRight.z*px.nx*HALF + snapUp.z*(-px.ny)*HALF;
    const dist = Math.sqrt(px.nx*px.nx + px.ny*px.ny);
    // target 通過後の余剰速度（外周ほど速く）
    // = throughSpeed との合計で target を ~15フレームで通過し、その後外側へ抜ける
    const extraSpeed = 0.028 + dist*0.048 + Math.random()*0.022;
    addDirP(
      center.x + (Math.random()-.5)*0.03,
      center.y + (Math.random()-.5)*0.03,
      center.z + (Math.random()-.5)*0.06,
      tx + (Math.random()-.5)*0.05,
      ty + (Math.random()-.5)*0.05,
      tz + (Math.random()-.5)*0.10,
      px.r, px.g, px.b,
      extraSpeed,
      (0.060+Math.random()*0.055)*szB,
      0.004+Math.random()*0.003  // 2.2〜4s で消える
    );
  }
  // 爆発中心フラッシュ（即時）
  for(let i=0;i<14;i++){
    addP(center.x,center.y,center.z,
      (Math.random()-.5)*.038,(Math.random()-.5)*.038,(Math.random()-.5)*.038,
      1,1,1, 0.055+Math.random()*0.040, 0.88+Math.random()*0.65);
  }
  // 中心残光（見失い防止）
  addCenterGlow(center.x, center.y, center.z);
}


// ══════════════════════════════════════════════
// ロケット
// ══════════════════════════════════════════════

const rockets = [];

function launchVector(start, end, pal, onBurst=null){
  const dir = end.clone().sub(start).normalize();
  rockets.push({ start:start.clone(), end:end.clone(), dir,
                 pos:new THREE.Vector3(), t:0, pal, trail:0, onBurst });
  showLaunchIndicator(start, end);
  whistle();
}

function updateRockets(){
  for(let i=rockets.length-1; i>=0; i--){
    const r = rockets[i];
    r.t = Math.min(1, r.t+0.017);
    const e = r.t<.5 ? 2*r.t*r.t : 1-(-2*r.t+2)**2/2;
    r.pos.lerpVectors(r.start, r.end, e);

    r.trail++;
    if(r.trail % 2 === 0){
      const tv = 0.016 + Math.random()*0.012;
      for(let k=0; k<3; k++){
        addP(
          r.pos.x+(Math.random()-.5)*.06,
          r.pos.y+(Math.random()-.5)*.06,
          r.pos.z+(Math.random()-.5)*.06,
          -r.dir.x*tv+(Math.random()-.5)*.008,
          -r.dir.y*tv+(Math.random()-.5)*.008,
          -r.dir.z*tv+(Math.random()-.5)*.008,
          1, 0.82+Math.random()*.18, 0.3+Math.random()*.3,
          0.048+Math.random()*0.05, 0.18+Math.random()*0.14);
      }
      addP(r.pos.x, r.pos.y, r.pos.z, 0,0,0, 1,1,1, 0.55, 0.42);
    }

    if(r.t >= 1){
      if(r.onBurst) r.onBurst(r.pos.clone());
      else burst(r.pos.x, r.pos.y, r.pos.z,
                 r.pal || PALETTES[Math.floor(Math.random()*PALETTES.length)]);
      rockets.splice(i,1);
    }
  }
}

// ══════════════════════════════════════════════
// アンカー方式花火打ち上げ（メインエントリ）
// tap時点のカメラ方向から world 座標を確定し、
// 以後ジャイロが動いても花火はその場に固定される
// ══════════════════════════════════════════════

function launchAnchorFirework(){
  const forward = new THREE.Vector3();
  cam.getWorldDirection(forward);
  const worldUp = new THREE.Vector3(0, 1, 0);

  const burstAnchor = cam.position.clone()
    .addScaledVector(forward, 10)
    .addScaledVector(worldUp, 3);
  const launchStart = burstAnchor.clone()
    .addScaledVector(worldUp, -5);

  const snapRight = new THREE.Vector3()
    .crossVectors(forward, worldUp).normalize();
  if(snapRight.lengthSq() < 0.01) snapRight.set(1,0,0);
  const snapUp = new THREE.Vector3()
    .crossVectors(snapRight, forward).normalize();

  // 画像読み込み（ロケット発射と並列）
  let imageData = null;
  if(works.length > 0){
    const work = works[Math.floor(Math.random()*works.length)];
    makeImageData(work.url)
      .then(d => { imageData = d; })
      .catch(() => {});
  }

  launchVector(launchStart, burstAnchor, null, burstPos => {
    // 爆発フラッシュ粒子（即時）
    for(let i=0;i<18;i++){
      addP(burstPos.x,burstPos.y,burstPos.z,
        (Math.random()-.5)*.045,(Math.random()-.5)*.045,(Math.random()-.5)*.045,
        1,1,1, 0.050+Math.random()*0.045, 0.90+Math.random()*0.75);
    }
    setTimeout(()=>boom(), 55);

    if(imageData && imageData.pixels && imageData.pixels.length > 0){
      // 爆発点から粒子が画像形状を通過→そのまま飛散
      showImageParticleShape(burstPos, imageData.pixels, snapRight, snapUp, imageData.isLineArt);
    } else {
      // 画像未取得: パレット花火にフォールバック
      burst(burstPos.x, burstPos.y, burstPos.z,
            PALETTES[Math.floor(Math.random()*PALETTES.length)]);
    }
  });
}

let _hintTimer = null;
function showFireworkHint(){
  const el = document.getElementById('fw-hint');
  if(!el) return;
  el.style.opacity = '1';
  clearTimeout(_hintTimer);
  _hintTimer = setTimeout(()=>{ el.style.opacity = '0'; }, 2600);
}

function onTap(e){
  try{ if(audioCtx) audioCtx.resume(); }catch(_){}
  launchAnchorFirework();
  showFireworkHint();
}

document.addEventListener('touchstart', onTap, {passive:true});
document.addEventListener('click', onTap);

// ══════════════════════════════════════════════
// ジャイロ
// ══════════════════════════════════════════════

let gyroOn = false;
let gA=0, gB=0, gG=0;
const euG = new THREE.Euler();
const q1G = new THREE.Quaternion(-Math.sqrt(.5),0,0,Math.sqrt(.5));
const q2G = new THREE.Quaternion();
const zeeG = new THREE.Vector3(0,0,1);
const R = THREE.MathUtils.degToRad;

function updateCamera(){
  if(xrActive) return;
  if(!gyroOn){
    cam.rotation.order='YXZ';
    cam.rotation.set(-0.28,0,0);
    return;
  }
  const heading = R(360-gA);
  euG.set(R(gB),R(gA),R(-gG),'YXZ');
  cam.quaternion.setFromEuler(euG);
  cam.quaternion.multiply(q1G);
  q2G.setFromAxisAngle(zeeG,-heading);
  cam.quaternion.multiply(q2G);
}

function startGyro(){
  gyroOn = true;
  window.addEventListener('deviceorientation', e=>{
    if(e.alpha===null) return;
    gA=e.alpha; gB=e.beta; gG=e.gamma;
  }, true);
}

function checkPerm(){
  if(typeof DeviceOrientationEvent==='undefined') return;
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    document.getElementById('perm').style.display='flex';
  } else { startGyro(); }
}

function grantPerm(){
  DeviceOrientationEvent.requestPermission()
    .then(s=>{
      document.getElementById('perm').style.display='none';
      if(s==='granted') startGyro();
    })
    .catch(()=>{ document.getElementById('perm').style.display='none'; });
}

// ══════════════════════════════════════════════
// WebXR
// ══════════════════════════════════════════════

let xrActive = false;
(async()=>{
  if(!navigator.xr) return;
  try{
    const ok = await navigator.xr.isSessionSupported('immersive-ar');
    if(ok) document.getElementById('xrbtn').style.display='block';
  }catch(_){}
})();

async function enterXR(){
  try{
    const s = await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local'],
      optionalFeatures:['dom-overlay'],
      domOverlay:{root:document.getElementById('ui')}
    });
    ren.xr.enabled=true; xrActive=true;
    await ren.xr.setSession(s);
    ren.setAnimationLoop(()=>{ tick(); ren.render(scene,cam); });
    s.addEventListener('end',()=>{
      ren.xr.enabled=false; xrActive=false;
      ren.setAnimationLoop(null);
    });
  }catch(e){ console.warn('WebXR:',e); }
}

// ══════════════════════════════════════════════
// オーディオ
// ══════════════════════════════════════════════

let audioCtx = null;
function getAu(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume(); return audioCtx;
}

// 打ち上げ音：のこぎり波＋サイン倍音で肉厚なヒュー
function whistle(){
  try{
    const ctx=getAu(), now=ctx.currentTime;
    const o1=ctx.createOscillator(), g1=ctx.createGain();
    o1.type='sawtooth';
    o1.frequency.setValueAtTime(180,now);
    o1.frequency.exponentialRampToValueAtTime(3200,now+1.1);
    g1.gain.setValueAtTime(0.022,now);
    g1.gain.linearRampToValueAtTime(0.040,now+0.65);
    g1.gain.linearRampToValueAtTime(0,now+1.1);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(now); o1.stop(now+1.1);
    // 倍音（高域の艶）
    const o2=ctx.createOscillator(), g2=ctx.createGain();
    o2.type='sine';
    o2.frequency.setValueAtTime(360,now);
    o2.frequency.exponentialRampToValueAtTime(6400,now+1.1);
    g2.gain.setValueAtTime(0.012,now);
    g2.gain.linearRampToValueAtTime(0,now+1.05);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(now); o2.stop(now+1.1);
  }catch(_){}
}

// 爆発音：2層構成（高域パン + 低音ドーン遅延）＋フィードバック残響
function boom(){
  try{
    const ctx=getAu(), sr=ctx.sampleRate, now=ctx.currentTime;
    const vol=0.30;

    // ── Layer 1: 高域破裂音（即時）──
    const n1=Math.floor(sr*0.14);
    const buf1=ctx.createBuffer(1,n1,sr);
    const d1=buf1.getChannelData(0);
    for(let i=0;i<n1;i++) d1[i]=(Math.random()*2-1)*Math.exp(-i/(n1*0.055));
    const src1=ctx.createBufferSource(); src1.buffer=buf1;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=700;
    const g1=ctx.createGain();
    g1.gain.setValueAtTime(vol*1.2,now);
    g1.gain.exponentialRampToValueAtTime(0.001,now+0.14);
    src1.connect(hpf); hpf.connect(g1); g1.connect(ctx.destination);
    src1.start(now);

    // ── Layer 2: 低音ドーン（0.14〜0.21秒後）──
    const d2st=now+0.14+Math.random()*0.07;
    const n2=Math.floor(sr*2.0);
    const buf2=ctx.createBuffer(1,n2,sr);
    const d2=buf2.getChannelData(0);
    for(let i=0;i<n2;i++) d2[i]=(Math.random()*2-1)*Math.exp(-i/(n2*0.20));
    const src2=ctx.createBufferSource(); src2.buffer=buf2;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=200; lpf.Q.value=1.5;
    // ソフトクリッピングで腹に響く歪み
    const ws=ctx.createWaveShaper();
    const wc=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2/255)-1; wc[i]=(3*x)/(2*(1+Math.abs(2.2*x)));}
    ws.curve=wc; ws.oversample='2x';
    const g2=ctx.createGain();
    g2.gain.setValueAtTime(0.001,d2st);
    g2.gain.linearRampToValueAtTime(vol*0.88,d2st+0.06);
    g2.gain.exponentialRampToValueAtTime(0.001,d2st+1.9);
    // フィードバック残響（ループ遅延）
    const dly=ctx.createDelay(0.5); dly.delayTime.value=0.058;
    const fb=ctx.createGain(); fb.gain.value=0.24;
    const rv=ctx.createGain(); rv.gain.value=0.20;
    src2.connect(lpf); lpf.connect(ws); ws.connect(g2);
    g2.connect(ctx.destination);
    g2.connect(dly); dly.connect(fb); fb.connect(dly); // 残響ループ
    fb.connect(rv); rv.connect(ctx.destination);
    src2.start(d2st);
  }catch(_){}
}

// ══════════════════════════════════════════════
// メインループ
// ══════════════════════════════════════════════

function tick(){
  updateCamera();
  updateRockets();
  updateArrowIndicator();
  updateParticles();
}

function animate(){
  requestAnimationFrame(animate);
  tick();
  ren.render(scene, cam);
}
animate();

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  ren.setSize(innerWidth,innerHeight);
});

checkPerm();
</script>
