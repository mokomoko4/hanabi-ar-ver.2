<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>花火AR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/three.js/build/ar-threex.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
#cv{position:fixed;inset:0;width:100%;height:100%;z-index:1;touch-action:none;}
#ui{position:fixed;bottom:0;left:0;right:0;padding-bottom:46px;z-index:2;
    pointer-events:none;display:flex;justify-content:center;}
.hint{font:13px/1 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
      color:rgba(255,255,255,.7);letter-spacing:.07em;
      text-shadow:0 2px 14px rgba(0,0,0,.95);
      animation:hp 3s ease-in-out infinite;}
@keyframes hp{0%,100%{opacity:.4}55%{opacity:.95}}
/* バージョン */
.ver{position:fixed;bottom:8px;right:12px;z-index:4;
     font:10px/1 monospace;color:rgba(255,255,255,.28);pointer-events:none;}
/* 打ち上げ方向インジケーター */
#launchDir{position:fixed;top:0;left:0;right:0;z-index:3;pointer-events:none;
           display:flex;flex-direction:column;align-items:center;padding-top:22px;gap:4px;
           opacity:0;transition:opacity .25s;}
#launchDir.show{opacity:1;}
.ud-arrow{font:40px/1 sans-serif;color:#ffdd00;
          text-shadow:0 0 20px #ff8800,0 0 40px #ff4400;
          animation:udbounce .55s ease-in-out infinite;}
@keyframes udbounce{0%,100%{transform:translateY(4px);}50%{transform:translateY(-6px);}}
.ud-label{font:11px/1 'Hiragino Kaku Gothic ProN',sans-serif;
          color:rgba(255,220,80,.9);letter-spacing:.12em;
          text-shadow:0 2px 12px rgba(255,120,0,.9);}
/* マーカー情報パネル */
#markerPanel{position:fixed;top:16px;left:16px;z-index:3;pointer-events:none;
             background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);
             border-radius:10px;padding:8px 14px;
             color:rgba(255,255,255,.8);
             font:11px/1.7 'Hiragino Kaku Gothic ProN',sans-serif;
             display:none;}
#markerPanel b{color:#ffdd44;}
#xrbtn{position:fixed;top:18px;right:16px;z-index:3;pointer-events:auto;
       padding:8px 18px;border:1px solid rgba(255,255,255,.3);
       background:rgba(0,0,0,.45);border-radius:20px;color:#fff;
       font-size:12px;cursor:pointer;display:none;
       font-family:'Hiragino Kaku Gothic ProN',sans-serif;}
#perm{position:fixed;inset:0;z-index:10;background:rgba(0,0,0,.88);display:none;
      flex-direction:column;align-items:center;justify-content:center;
      gap:22px;padding:40px;text-align:center;color:#fff;
      font:13px/1.9 'Hiragino Kaku Gothic ProN',sans-serif;}
.pbtn{padding:13px 36px;border:none;border-radius:14px;
      background:linear-gradient(135deg,#ff6b00,#ffcc00);
      color:#000;font-size:15px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div id="ui"><span class="hint" id="hintTxt">タップで花火打ち上げ 🎆</span></div>

<!-- 打ち上げ方向インジケーター（ロケット発射時に表示） -->
<div id="launchDir">
  <div class="ud-arrow">↑</div>
  <div class="ud-label">打ち上げ中</div>
</div>

<!-- AR マーカーパネル -->
<div id="markerPanel">
  <div id="markerStatus">📷 マーカー: 未検出</div>
  <div style="font-size:10px;opacity:.55;margin-top:1px">Hiro マーカーをかざしてください</div>
</div>

<div class="ver">v7.1</div>
<button id="xrbtn" onclick="enterXR()">AR モード ✦</button>
<div id="perm">
  <div style="font-size:14px;line-height:2;opacity:.85">
    スマホを空に向けると<br>花火が空に見えます<br>
    <small style="opacity:.6;font-size:11px">センサー使用を許可してください</small>
  </div>
  <button class="pbtn" onclick="grantPerm()">許可して始める ▶</button>
</div>

<script>
// ══════════════════════════════════════════════
// Three.js セットアップ
// ══════════════════════════════════════════════

const cv = document.getElementById('cv');
const ren = new THREE.WebGLRenderer({canvas:cv, alpha:true, antialias:true});
ren.setPixelRatio(Math.min(devicePixelRatio, 2.5));
ren.setSize(innerWidth, innerHeight);
ren.setClearColor(0, 0);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 500);
cam.position.set(0, 0, 0);

// ══════════════════════════════════════════════
// AR.js マーカー追跡
// ══════════════════════════════════════════════

const arAvail = typeof THREEx !== 'undefined';
let arSource = null, arContext = null, markerGroup = null;
let lastMarkerLaunch = 0;
const _mPos = new THREE.Vector3();

if(arAvail){
  arSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
  arSource.init(function onReady(){
    document.getElementById('markerPanel').style.display = 'block';
    document.getElementById('hintTxt').textContent =
      'Hiro マーカーをかざすか、タップで花火打ち上げ 🎆';
    _onARResize();
  }, function onError(e){ console.warn('AR source error', e); });

  arContext = new THREEx.ArToolkitContext({
    cameraParametersUrl:
      'https://raw.githack.com/AR-js-org/AR.js/3.4.5/data/data/camera_para.dat',
    detectionMode: 'mono',
  });
  arContext.init(function onCompleted(){
    cam.projectionMatrix.copy(arContext.getProjectionMatrix());
  });

  markerGroup = new THREE.Group();
  scene.add(markerGroup);

  new THREEx.ArMarkerControls(arContext, markerGroup, {
    type: 'pattern',
    patternUrl:
      'https://raw.githack.com/AR-js-org/AR.js/3.4.5/data/data/patt.hiro',
  });
} else {
  // AR.js 未ロード時はカメラを自前で取得
  const vid = document.createElement('video');
  Object.assign(vid, {autoplay:true, playsInline:true, muted:true});
  vid.setAttribute('playsinline','');
  vid.style.cssText =
    'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;';
  document.body.prepend(vid);
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(s=>{ vid.srcObject = s; })
    .catch(()=>{ document.body.style.background = '#04001a'; });
}

function _onARResize(){
  if(!arSource || !arSource.ready) return;
  arSource.onResizeElement();
  arSource.copyElementSizeTo(ren.domElement);
  if(arContext && arContext.arController)
    arSource.copyElementSizeTo(arContext.arController.canvas);
}

// マーカー検出時の自動打ち上げ
function updateMarkerLaunch(){
  if(!markerGroup) return;
  const vis = markerGroup.visible;
  const statusEl = document.getElementById('markerStatus');

  if(!vis){
    if(statusEl) statusEl.textContent = '📷 マーカー: 未検出';
    return;
  }
  if(statusEl) statusEl.innerHTML = '✅ マーカー: <b>検出中</b>';

  if(Date.now() - lastMarkerLaunch < 3200) return;
  lastMarkerLaunch = Date.now();

  // マーカーのスクリーン位置を求め、標準のワールド座標に変換
  markerGroup.getWorldPosition(_mPos);
  const sp = _mPos.clone().project(cam);
  const sx = (sp.x *  0.5 + 0.5) * innerWidth;
  const sy = (sp.y * -0.5 + 0.5) * innerHeight;
  const wz = -11 - Math.random()*3;
  const wp = tapToWorld(sx, sy, wz);
  const wy1 = Math.max(1.5, Math.min(8.0, wp.y + 3 + Math.random()*2));
  const pal = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  launch(wp.x + (Math.random()-.5)*.5, wy1, wz, pal);
}

// ══════════════════════════════════════════════
// 打ち上げ方向インジケーター（3D + CSS）
// ══════════════════════════════════════════════

const arrowHelper = new THREE.ArrowHelper(
  new THREE.Vector3(0,1,0),
  new THREE.Vector3(0,0,0),
  8, 0xffcc00, 1.0, 0.5
);
arrowHelper.line.material.blending    = THREE.AdditiveBlending;
arrowHelper.line.material.transparent = true;
arrowHelper.cone.material.blending    = THREE.AdditiveBlending;
arrowHelper.cone.material.transparent = true;
arrowHelper.visible = false;
scene.add(arrowHelper);

let arrowFrames = 0;
const launchDirEl = document.getElementById('launchDir');

function showLaunchIndicator(x, y0, z, y1){
  const len = Math.max(1.5, y1 - y0);
  arrowHelper.position.set(x, y0, z);
  arrowHelper.setLength(len, Math.min(1.2, len*0.15), Math.min(0.55, len*0.07));
  arrowHelper.visible = true;
  arrowHelper.line.material.opacity = 0.85;
  arrowHelper.cone.material.opacity = 0.85;
  arrowFrames = 100;
  launchDirEl.classList.add('show');
}

function updateArrowIndicator(){
  if(arrowFrames <= 0){
    arrowHelper.visible = false;
    launchDirEl.classList.remove('show');
    return;
  }
  arrowFrames--;
  const t = arrowFrames / 100;
  arrowHelper.line.material.opacity = 0.85 * t;
  arrowHelper.cone.material.opacity = 0.85 * t;
  if(arrowFrames === 0) launchDirEl.classList.remove('show');
}

// ══════════════════════════════════════════════
// パーティクル GPU バッファ
// ══════════════════════════════════════════════

const MAX = 6000;
const bP = new Float32Array(MAX*3);
const bC = new Float32Array(MAX*3);
const bA = new Float32Array(MAX);
const bS = new Float32Array(MAX);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(bP,3));
geo.setAttribute('aC',       new THREE.BufferAttribute(bC,3));
geo.setAttribute('aA',       new THREE.BufferAttribute(bA,1));
geo.setAttribute('aS',       new THREE.BufferAttribute(bS,1));

const mat = new THREE.ShaderMaterial({
  vertexShader:`
    attribute vec3 aC; attribute float aA,aS;
    varying vec3 vC; varying float vA;
    void main(){
      vC=aC; vA=aA;
      vec4 mv=modelViewMatrix*vec4(position,1.);
      gl_PointSize=aS*(520.0/-mv.z);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying vec3 vC; varying float vA;
    void main(){
      float d=length(gl_PointCoord-vec2(.5))*2.;
      float core=1.-smoothstep(.0,.26,d);
      float halo=1.-smoothstep(.12,1.,d);
      float a=(core*.92+halo*.26)*vA;
      if(a<.01)discard;
      gl_FragColor=vec4(clamp(vC*(1.+core*2.6),0.,1.),a);
    }`,
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
});
geo.setDrawRange(0,0);
scene.add(new THREE.Points(geo, mat));

// ══════════════════════════════════════════════
// パーティクル 状態配列
// ══════════════════════════════════════════════

const ps = [];
function addP(x,y,z, vx,vy,vz, r,g,b, decay, s){
  ps.push({x,y,z,vx,vy,vz,r,g,b,a:1.0,decay,s});
}

function updateParticles(){
  let cnt = 0;
  for(let i=ps.length-1; i>=0; i--){
    const p = ps[i];
    p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
    p.vy -= 0.0030;
    p.vx *= 0.983; p.vy *= 0.983; p.vz *= 0.968;
    p.a  -= p.decay;
    if(p.a <= 0){ ps.splice(i,1); continue; }
    if(cnt >= MAX) continue;
    bP[cnt*3]=p.x; bP[cnt*3+1]=p.y; bP[cnt*3+2]=p.z;
    bC[cnt*3]=p.r; bC[cnt*3+1]=p.g; bC[cnt*3+2]=p.b;
    bA[cnt]=p.a;   bS[cnt]=p.s;
    cnt++;
  }
  for(let j=cnt; j<Math.min(cnt+40,MAX); j++) bA[j]=0;
  geo.setDrawRange(0,cnt);
  geo.attributes.position.needsUpdate=true;
  geo.attributes.aC.needsUpdate=true;
  geo.attributes.aA.needsUpdate=true;
  geo.attributes.aS.needsUpdate=true;
}

// ══════════════════════════════════════════════
// カラーパレット
// ══════════════════════════════════════════════

const PALETTES = [
  [[1,.22,.05],[1,.55,.1],[1,.9,.2],[1,1,1]],
  [[.12,.38,1],[.45,.72,1],[.8,.9,1],[1,1,1]],
  [[.05,1,.28],[.55,1,.12],[1,1,.28],[1,1,1]],
  [[.88,.08,1],[1,.38,.9],[1,.72,1],[1,1,1]],
  [[1,.80,.05],[1,.92,.42],[1,1,.88],[1,1,1]],
  [[1,.15,.15],[.1,.88,1],[1,1,.32],[1,1,1]],
];

// ══════════════════════════════════════════════
// 爆発
// ══════════════════════════════════════════════

function burst(x, y, z, pal){
  for(let i=0; i<200; i++){
    const theta = Math.random()*Math.PI*2;
    const phi   = Math.acos(2*Math.random()-1);
    const sp    = 0.038 + Math.random()*0.085;
    const zFwd  = (Math.random() < 0.15) ? 0.055 + Math.random()*0.045 : 0;
    const c = pal[Math.floor(Math.random()*pal.length)];
    addP(x,y,z,
      Math.sin(phi)*Math.cos(theta)*sp,
      Math.sin(phi)*Math.sin(theta)*sp,
      Math.cos(phi)*sp*0.58 + zFwd,
      c[0],c[1],c[2],
      0.004+Math.random()*0.006,
      0.26+Math.random()*0.32);
  }
  for(let i=0; i<30; i++){
    const c = pal[Math.floor(Math.random()*pal.length)];
    const a = Math.random()*Math.PI*2;
    const r = 0.05+Math.random()*0.12;
    addP(x+Math.cos(a)*r, y+Math.sin(a)*r, z+(Math.random()-.5)*.2,
      (Math.random()-.5)*.018, 0.015+Math.random()*0.025, (Math.random()-.5)*.015,
      c[0],c[1],c[2],
      0.003+Math.random()*0.003,
      0.45+Math.random()*0.40);
  }
  for(let i=0; i<14; i++){
    addP(x,y,z,
      (Math.random()-.5)*.025,(Math.random()-.5)*.025,(Math.random()-.5)*.025,
      1,1,1, 0.065+Math.random()*0.055, 0.55+Math.random()*0.60);
  }
  setTimeout(()=>boom(), 55);
}

// ══════════════════════════════════════════════
// ロケット
// ══════════════════════════════════════════════

const rockets = [];

function launch(wx, wy1, wz, pal){
  const y0 = -5.5;
  rockets.push({ x:wx, z:wz, y0, y1:wy1, t:0, pal, trail:0 });
  showLaunchIndicator(wx, y0, wz, wy1);
  whistle();
}

function updateRockets(){
  for(let i=rockets.length-1; i>=0; i--){
    const r = rockets[i];
    r.t = Math.min(1, r.t+0.017);
    const e = r.t<.5 ? 2*r.t*r.t : 1-(-2*r.t+2)**2/2;
    const ry = r.y0 + (r.y1-r.y0)*e;

    r.trail++;
    if(r.trail % 2 === 0){
      for(let k=0; k<3; k++){
        addP(
          r.x+(Math.random()-.5)*.06,
          ry+(Math.random()-.5)*.06,
          r.z+(Math.random()-.5)*.06,
          (Math.random()-.5)*.008,
          -0.014-Math.random()*.012,
          (Math.random()-.5)*.008,
          1, 0.82+Math.random()*.18, 0.3+Math.random()*.3,
          0.048+Math.random()*0.05,
          0.18+Math.random()*0.14);
      }
      addP(r.x, ry, r.z, 0,0,0, 1,1,1, 0.55, 0.42);
    }

    if(r.t >= 1){
      burst(r.x, r.y1, r.z, r.pal);
      rockets.splice(i,1);
    }
  }
}

// ══════════════════════════════════════════════
// タップ → ワールド座標
// ══════════════════════════════════════════════

function tapToWorld(sx, sy, wz){
  const ndcX = (sx/innerWidth)*2-1;
  const ndcY = -(sy/innerHeight)*2+1;
  const v = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(cam);
  v.sub(cam.position).normalize();
  const t = Math.abs(v.z) > 1e-4 ? (wz-cam.position.z)/v.z : 10;
  return { x: cam.position.x + v.x*t, y: cam.position.y + v.y*t };
}

function onTap(e){
  try{ if(audioCtx) audioCtx.resume(); }catch(_){}
  const touch = e.changedTouches ? e.changedTouches[0] : e;
  const wz  = -11 - Math.random()*3;
  const wp  = tapToWorld(touch.clientX, touch.clientY, wz);
  const wy1 = Math.max(1.5, Math.min(8.0, wp.y));
  const pal = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  launch(wp.x + (Math.random()-.5)*.6, wy1, wz, pal);
}

cv.addEventListener('touchstart', onTap, {passive:true});
cv.addEventListener('click', onTap);

// ══════════════════════════════════════════════
// ジャイロ
// ══════════════════════════════════════════════

let gyroOn = false;
let gA=0, gB=0, gG=0;
const euG = new THREE.Euler();
const q1G = new THREE.Quaternion(-Math.sqrt(.5),0,0,Math.sqrt(.5));
const q2G = new THREE.Quaternion();
const zeeG = new THREE.Vector3(0,0,1);
const R = THREE.MathUtils.degToRad;

function updateCamera(){
  if(xrActive) return;
  // AR.js 使用中はカメラをアイデンティティに保つ（マーカー追跡が pose を管理）
  if(arAvail && arSource && arSource.ready){
    cam.position.set(0,0,0);
    cam.rotation.set(0,0,0);
    return;
  }
  if(!gyroOn){
    cam.rotation.order = 'YXZ';
    cam.rotation.set(-0.28, 0, 0);
    return;
  }
  const heading = R(360 - gA);
  euG.set(R(gB), R(gA), R(-gG), 'YXZ');
  cam.quaternion.setFromEuler(euG);
  cam.quaternion.multiply(q1G);
  q2G.setFromAxisAngle(zeeG, -heading);
  cam.quaternion.multiply(q2G);
}

function startGyro(){
  gyroOn = true;
  window.addEventListener('deviceorientation', e=>{
    if(e.alpha===null) return;
    gA=e.alpha; gB=e.beta; gG=e.gamma;
  }, true);
}

function checkPerm(){
  if(typeof DeviceOrientationEvent === 'undefined') return;
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    document.getElementById('perm').style.display = 'flex';
  } else {
    startGyro();
  }
}

function grantPerm(){
  DeviceOrientationEvent.requestPermission()
    .then(s=>{
      document.getElementById('perm').style.display = 'none';
      if(s==='granted') startGyro();
    })
    .catch(()=>{ document.getElementById('perm').style.display = 'none'; });
}

// ══════════════════════════════════════════════
// WebXR
// ══════════════════════════════════════════════

let xrActive = false;
(async()=>{
  if(!navigator.xr) return;
  try{
    const ok = await navigator.xr.isSessionSupported('immersive-ar');
    if(ok) document.getElementById('xrbtn').style.display = 'block';
  }catch(_){}
})();

async function enterXR(){
  try{
    const s = await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local'],
      optionalFeatures:['dom-overlay'],
      domOverlay:{root:document.getElementById('ui')}
    });
    ren.xr.enabled = true; xrActive = true;
    await ren.xr.setSession(s);
    ren.setAnimationLoop(tick);
    s.addEventListener('end',()=>{
      ren.xr.enabled = false; xrActive = false;
      ren.setAnimationLoop(null);
      requestAnimationFrame(loop);
    });
  }catch(e){ console.warn('WebXR:', e); }
}

// ══════════════════════════════════════════════
// オーディオ
// ══════════════════════════════════════════════

let audioCtx = null;
function getAu(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume(); return audioCtx;
}
function whistle(){
  try{
    const ctx=getAu(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(200, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(2400, ctx.currentTime+1.15);
    g.gain.setValueAtTime(.038, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime+1.15);
    o.start(); o.stop(ctx.currentTime+1.15);
  }catch(_){}
}
function boom(vol=0.30){
  try{
    const ctx=getAu(), sr=ctx.sampleRate;
    const n=Math.floor(sr*.82);
    const buf=ctx.createBuffer(1,n,sr), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*.10));
    const src=ctx.createBufferSource(); src.buffer=buf;
    const g=ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.82);
    src.connect(g); g.connect(ctx.destination); src.start();
    if(vol > .10) setTimeout(()=>boom(vol*.28), 290);
  }catch(_){}
}

// ══════════════════════════════════════════════
// メインループ
// ══════════════════════════════════════════════

function tick(){
  if(arAvail && arSource && arSource.ready){
    arContext.update(arSource.domElement);
    updateMarkerLaunch();
  }
  updateCamera();
  updateRockets();
  updateArrowIndicator();
  updateParticles();
  ren.render(scene, cam);
}

function loop(){ requestAnimationFrame(loop); tick(); }
loop();

// ══════════════════════════════════════════════
// リサイズ
// ══════════════════════════════════════════════

window.addEventListener('resize',()=>{
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  ren.setSize(innerWidth, innerHeight);
  _onARResize();
});

// ══════════════════════════════════════════════
// 初回デモ（ページロード時に自動打ち上げ）
// ══════════════════════════════════════════════

checkPerm();

function autoLaunch(x, wy1, wz, palIdx, delay){
  setTimeout(()=>{ launch(x, wy1, wz, PALETTES[palIdx]); }, delay);
}
autoLaunch(-1.4, 4.8, -12, 0, 1100);
autoLaunch( 1.6, 5.2, -11, 1, 2600);
autoLaunch(-0.3, 6.0, -13, 4, 4300);
