<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はなびARあそび</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#06001a;color:#fff;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
body{background:radial-gradient(ellipse at 50% 40%,#1a0035 0%,#06001a 70%);}
.emoji{font-size:64px;animation:float 3s ease-in-out infinite;margin-bottom:16px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.title{font-size:28px;font-weight:900;text-align:center;line-height:1.3;margin-bottom:12px;background:linear-gradient(135deg,#ffcc44,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.desc{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:2;margin-bottom:32px;}
.btn{width:100%;max-width:320px;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6b00,#ffcc00);color:#000;font-size:16px;font-weight:900;cursor:pointer;margin-bottom:12px;}
.btn-sub{width:100%;max-width:320px;padding:14px;border:1px solid rgba(255,255,255,0.2);border-radius:16px;background:rgba(255,255,255,0.05);color:#fff;font-size:14px;cursor:pointer;}
</style>
</head>
<body>
  <div class="emoji">🎆</div>
  <div class="title">はなびAR<br>あそび</div>
  <div class="desc">QRコードを読んで<br>みんなの作品が浮かぶ空間へ！</div>
  <button class="btn" onclick="window.location.href='view.html'">🌍 AR空間に入る</button>
  <button class="btn-sub" onclick="window.location.href='upload.html'">🎨 作品をアップする</button>
</body>
</html>
