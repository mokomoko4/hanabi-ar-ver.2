<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はなびARあそび</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#06001a;color:#fff;height:100dvh;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100dvh;align-items:center;justify-content:center;padding:24px;}
.screen.active{display:flex;}

/* トップ */
#screen-top{background:radial-gradient(ellipse at 50% 40%,#1a0035 0%,#06001a 70%);}
.top-emoji{font-size:64px;animation:float 3s ease-in-out infinite;margin-bottom:16px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.top-title{font-size:28px;font-weight:900;text-align:center;line-height:1.3;margin-bottom:12px;background:linear-gradient(135deg,#ffcc44,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-desc{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:2;margin-bottom:24px;}
.upload-box{width:100%;max-width:320px;border:2px dashed rgba(100,180,255,0.5);border-radius:20px;padding:24px;text-align:center;cursor:pointer;background:rgba(100,180,255,0.06);transition:all 0.2s;margin-bottom:12px;}
.upload-box .icon{font-size:40px;margin-bottom:8px;}
.upload-box .label{font-size:14px;color:rgba(255,255,255,0.8);margin-bottom:4px;}
.upload-box .sub{font-size:11px;color:rgba(255,255,255,0.35);}
.upload-box.selected{border-color:rgba(100,255,150,0.6);background:rgba(100,255,150,0.08);}
.upload-box.selected .label{color:#88ffaa;}
.start-btn{width:100%;max-width:320px;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6b00,#ffcc00);color:#000;font-size:16px;font-weight:900;cursor:pointer;display:none;margin-bottom:12px;}
.start-btn.show{display:block;}

/* QRスキャン画面 */
#screen-qr{display:none;position:fixed;inset:0;background:#000;}
#screen-qr.active{display:block;}
#qrVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.qr-ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.qr-header{width:100%;padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;align-items:center;gap:10px;pointer-events:all;}
.qr-back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.qr-title{font-size:14px;font-weight:700;color:#ffcc44;}
.qr-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.qr-frame{
  margin:auto;
  width:220px;height:220px;
  border:3px solid rgba(255,200,60,0.8);
  border-radius:20px;
  position:relative;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.45);
}
.qr-corner{position:absolute;width:28px;height:28px;border-color:#ffcc44;border-style:solid;}
.qr-corner.tl{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:8px 0 0 0;}
.qr-corner.tr{top:-3px;right:-3px;border-width:4px 4px 0 0;border-radius:0 8px 0 0;}
.qr-corner.bl{bottom:-3px;left:-3px;border-width:0 0 4px 4px;border-radius:0 0 0 8px;}
.qr-corner.br{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 8px 0;}
.qr-scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ffcc44,transparent);animation:scan 2s linear infinite;}
@keyframes scan{0%{top:0;}100%{top:100%;}}
.qr-hint{margin-top:24px;padding:8px 20px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:20px;font-size:12px;color:rgba(255,255,255,0.8);pointer-events:all;}

/* AR画面 */
#screen-ar{display:none;position:fixed;inset:0;background:#000;}
#screen-ar.active{display:block;}
#arVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#arCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.ar-ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
.ar-header{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;align-items:center;gap:10px;pointer-events:all;}
.ar-back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.ar-title{font-size:14px;font-weight:700;color:#ffcc44;}
.ar-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.ar-status{margin:auto auto 0;padding:8px 20px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:20px;font-size:12px;color:rgba(255,255,255,0.8);text-align:center;transition:all 0.4s;}
.ar-status.found{border-color:rgba(100,255,150,0.5);color:#88ffaa;background:rgba(0,40,20,0.7);}
.ar-bottom{padding:12px 16px 28px;background:linear-gradient(0deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;gap:8px;pointer-events:all;}
.ar-btn{flex:1;padding:11px 8px;border-radius:14px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:11px;text-align:center;cursor:pointer;}
.ar-btn .bi{font-size:20px;display:block;margin-bottom:3px;}
.ar-tap-hint{position:absolute;bottom:120px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,0.5);z-index:10;pointer-events:none;}
</style>
</head>
<body>

<!-- トップ -->
<div class="screen active" id="screen-top">
  <div class="top-emoji">🎆</div>
  <div class="top-title">はなびAR<br>あそび</div>
  <div class="top-desc">GLBを選んでQRコードを読み取ると<br>3Dモデルが現れるよ！</div>
  <div class="upload-box" id="uploadBox" onclick="document.getElementById('glbInput').click()">
    <div class="icon">🧊</div>
    <div class="label">GLBファイルを選ぶ</div>
    <div class="sub">タップしてファイルを選択</div>
  </div>
  <input type="file" id="glbInput" accept=".glb,.gltf" style="display:none;" onchange="handleGLB(this)">
  <button class="start-btn" id="startBtn" onclick="goQR()">QRコードを読む 📷</button>
</div>

<!-- QRスキャン -->
<div id="screen-qr">
  <video id="qrVideo" autoplay playsinline muted></video>
  <canvas id="qrDetectCanvas" style="display:none;"></canvas>
  <div class="qr-ui">
    <div class="qr-header">
      <div class="qr-back" onclick="stopQR()">←</div>
      <div>
        <div class="qr-title">QRコードを読み取って</div>
        <div class="qr-sub">枠の中にQRコードを入れてね</div>
      </div>
    </div>
    <div class="qr-frame">
      <div class="qr-corner tl"></div>
      <div class="qr-corner tr"></div>
      <div class="qr-corner bl"></div>
      <div class="qr-corner br"></div>
      <div class="qr-scan-line"></div>
    </div>
    <div class="qr-hint" id="qrHint">📷 QRコードを探しています…</div>
  </div>
</div>

<!-- AR -->
<div id="screen-ar">
  <video id="arVideo" autoplay playsinline muted></video>
  <canvas id="arCanvas"></canvas>
  <div class="ar-tap-hint">画面をタップするとモデルが出るよ！</div>
  <div class="ar-ui">
    <div class="ar-header">
      <div class="ar-back" onclick="stopAR()">←</div>
      <div>
        <div class="ar-title">AR体験中！</div>
        <div class="ar-sub" id="arSub">画面をタップしてみてね</div>
      </div>
    </div>
    <div class="ar-status" id="arStatus">📷 タップでモデルを出してみよう</div>
    <div class="ar-bottom">
      <div class="ar-btn" onclick="stopAR()"><span class="bi">←</span>もどる</div>
      <div class="ar-btn" onclick="alert('スマホのスクショで撮ってね！')"><span class="bi">📸</span>写真を撮る</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let glbURL = null;
let qrStream = null;
let arStream = null;
let renderer, scene, threeCamera, model;
let animId = null;
let modelVisible = false;
let qrScanId = null;

// ── GLB選択 ──
function handleGLB(input) {
  const file = input.files[0];
  if(!file) return;
  if(glbURL) URL.revokeObjectURL(glbURL);
  glbURL = URL.createObjectURL(file);
  const box = document.getElementById('uploadBox');
  box.classList.add('selected');
  box.innerHTML = '<div class="icon">✅</div><div class="label">'+file.name+'</div><div class="sub">'+(file.size/1024).toFixed(1)+'KB</div>';
  document.getElementById('startBtn').classList.add('show');
}

// ── QRスキャン画面へ ──
async function goQR() {
  if(!glbURL) return;
  document.getElementById('screen-top').classList.remove('active');
  document.getElementById('screen-qr').classList.add('active');

  try {
    qrStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:720}}
    });
    document.getElementById('qrVideo').srcObject = qrStream;
    await document.getElementById('qrVideo').play();
  } catch(e) {
    document.getElementById('qrHint').textContent = 'カメラの許可が必要です';
    return;
  }

  // jsQRで全ブラウザ対応
  scanQR();
}

function scanQR() {
  const video = document.getElementById('qrVideo');
  const dc = document.getElementById('qrDetectCanvas');
  if(!dc) return;
  if(video.readyState === video.HAVE_ENOUGH_DATA) {
    dc.width = video.videoWidth || 640;
    dc.height = video.videoHeight || 480;
    const ctx = dc.getContext('2d');
    ctx.drawImage(video, 0, 0, dc.width, dc.height);
    const imageData = ctx.getImageData(0, 0, dc.width, dc.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });
    if(code) {
      document.getElementById('qrHint').textContent = '✅ QR読み取り成功！';
      stopQR();
      startAR(code.data);
      return;
    }
  }
  qrScanId = setTimeout(scanQR, 200);
}

function stopQR() {
  if(qrScanId){ clearTimeout(qrScanId); qrScanId = null; }
  if(qrStream) qrStream.getTracks().forEach(t => t.stop());
  qrStream = null;
  document.getElementById('screen-qr').classList.remove('active');
}

// ── AR起動 ──
async function startAR(qrData) {
  document.getElementById('screen-ar').classList.add('active');

  // カメラ起動
  try {
    arStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:720}}
    });
    const video = document.getElementById('arVideo');
    video.srcObject = arStream;
    await video.play();
  } catch(e) {
    document.getElementById('arStatus').textContent = 'カメラの許可が必要です';
    return;
  }

  // Three.js
  const canvas = document.getElementById('arCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);

  scene = new THREE.Scene();
  threeCamera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  threeCamera.position.set(0, 0.8, 2.5);
  threeCamera.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 1.5));
  const dir = new THREE.DirectionalLight(0xffffff, 1.0);
  dir.position.set(1,2,1); scene.add(dir);

  // GLB読み込み
  const loader = new THREE.GLTFLoader();
  loader.load(glbURL, (gltf) => {
    model = gltf.scene;
    const box3 = new THREE.Box3().setFromObject(model);
    const size = box3.getSize(new THREE.Vector3());
    model.scale.setScalar(1.2 / Math.max(size.x, size.y, size.z));
    model.position.set(0, 0, 0);
    model.visible = false;
    scene.add(model);
  });

  // タップでモデル表示
  canvas.style.pointerEvents = 'all';
  canvas.addEventListener('click', toggleModel);

  // QRデータを表示
  if(qrData && qrData !== 'QRスキャン成功！') {
    document.getElementById('arSub').textContent = 'QR: ' + qrData.slice(0,30);
  }

  // レンダリングループ
  function render() {
    animId = requestAnimationFrame(render);
    if(model && model.visible) model.rotation.y += 0.008;
    renderer.render(scene, threeCamera);
  }
  render();
}

function toggleModel() {
  if(!model) return;
  modelVisible = !modelVisible;
  model.visible = modelVisible;
  const st = document.getElementById('arStatus');
  const sub = document.getElementById('arSub');
  const hint = document.querySelector('.ar-tap-hint');
  if(modelVisible) {
    st.textContent = '✨ モデルが出た！';
    st.classList.add('found');
    sub.textContent = 'もう一度タップで消えるよ';
    hint.style.display = 'none';
  } else {
    st.textContent = '📷 タップでモデルを出してみよう';
    st.classList.remove('found');
    sub.textContent = '画面をタップしてみてね';
    hint.style.display = 'block';
  }
}

function stopAR() {
  if(animId){ cancelAnimationFrame(animId); animId = null; }
  if(arStream) arStream.getTracks().forEach(t => t.stop());
  arStream = null;
  const canvas = document.getElementById('arCanvas');
  canvas.removeEventListener('click', toggleModel);
  canvas.style.pointerEvents = 'none';
  if(renderer){ renderer.dispose(); renderer = null; }
  scene = null; threeCamera = null; model = null;
  modelVisible = false;
  document.getElementById('screen-ar').classList.remove('active');
  document.getElementById('screen-top').classList.add('active');
  document.getElementById('arStatus').textContent = '📷 タップでモデルを出してみよう';
  document.getElementById('arStatus').classList.remove('found');
  document.querySelector('.ar-tap-hint').style.display = 'block';
}
</script>
</body>
</html>
