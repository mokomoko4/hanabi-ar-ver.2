<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はなびARワールド</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}
#canvas{position:fixed;inset:0;width:100%;height:100%;}

/* UI */
.ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
.header{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);display:flex;align-items:center;gap:10px;pointer-events:all;}
.back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#fff;text-decoration:none;}
.title{font-size:14px;font-weight:700;color:#ffcc44;}
.sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.count{margin-left:auto;padding:4px 12px;border-radius:20px;background:rgba(255,200,60,0.15);border:1px solid rgba(255,200,60,0.3);font-size:11px;color:#ffcc44;}

.hint{
  position:fixed;bottom:100px;left:0;right:0;
  text-align:center;font-size:12px;
  color:rgba(255,255,255,0.6);
  pointer-events:none;
  animation:fadeout 4s ease-in-out forwards;
  animation-delay:3s;
}
@keyframes fadeout{0%{opacity:1;}100%{opacity:0;}}

.bottom{padding:12px 16px 32px;background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,transparent 100%);display:flex;gap:8px;pointer-events:all;}
.btn{flex:1;padding:11px 8px;border-radius:14px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:11px;text-align:center;cursor:pointer;}
.btn .bi{font-size:20px;display:block;margin-bottom:3px;}

/* ローディング */
#loading{
  position:fixed;inset:0;z-index:100;
  background:#06001a;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
}
.loading-emoji{font-size:48px;animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.loading-text{font-size:14px;color:rgba(255,255,255,0.7);}
.loading-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;}
.loading-bar{height:100%;background:linear-gradient(90deg,#ff6b00,#ffcc00);border-radius:2px;width:0%;transition:width 0.3s;}

/* ジャイロ許可 */
#gyroPrompt{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.9);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  padding:32px;
}
#gyroPrompt h2{font-size:20px;font-weight:900;color:#ffcc44;text-align:center;}
#gyroPrompt p{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.8;}
#gyroPrompt button{padding:14px 40px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6b00,#ffcc00);color:#000;font-size:15px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<video id="bgVideo" autoplay playsinline muted style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;"></video>
<canvas id="canvas"></canvas>

<!-- ローディング -->
<div id="loading">
  <div class="loading-emoji">🎆</div>
  <div class="loading-text">空間を準備中…</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
</div>

<!-- ジャイロ許可（iPhone用） -->
<div id="gyroPrompt" style="display:none;">
  <h2>🌍 AR空間に入るよ！</h2>
  <p>スマホを動かして<br>360°の空間を見渡してね！<br><br>センサーの許可が必要です</p>
  <button onclick="requestGyro()">許可して入る ▶</button>
</div>

<div class="ui">
  <div class="header">
    <a class="back" href="index.html">←</a>
    <div>
      <div class="title">みんなのAR空間</div>
      <div class="sub">スマホを動かして見渡してね</div>
    </div>
    <div class="count" id="countBadge">0 作品</div>
  </div>
  <div class="hint">📱 傾けて見渡そう！タップで花火を打ち上げ！🎆</div>
  <div class="bottom">
    <div class="btn" onclick="window.location.href='index.html'"><span class="bi">←</span>もどる</div>
    <div class="btn" onclick="resetView()"><span class="bi">🔄</span>向き直す</div>
    <div class="btn" onclick="alert('スマホのスクショで撮ってね！')"><span class="bi">📸</span>写真を撮る</div>
  </div>
</div>

<script>
// カメラ起動
navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream => {
    document.getElementById('bgVideo').srcObject = stream;
  }).catch(() => {});

// ── デモ用の作品データ（後でFirebaseに差し替える） ──
// デモ用：CanvasでカラフルなPNGを生成して表示
const DEMO_WORKS = [
  { type: 'canvas', color: '#ff6b6b', emoji: '🎆', theta: 0,    phi: 0.3,  scale: 1.5 },
  { type: 'canvas', color: '#ffcc44', emoji: '🌟', theta: 1.2,  phi: -0.2, scale: 1.2 },
  { type: 'canvas', color: '#66dd44', emoji: '🎨', theta: 2.5,  phi: 0.5,  scale: 1.0 },
  { type: 'canvas', color: '#4488ff', emoji: '🌈', theta: -1.0, phi: 0.1,  scale: 1.3 },
  { type: 'canvas', color: '#cc66ff', emoji: '🦊', theta: 3.8,  phi: -0.3, scale: 1.1 },
  { type: 'canvas', color: '#ff88bb', emoji: '🌸', theta: -2.2, phi: 0.4,  scale: 1.4 },
  { type: 'canvas', color: '#44ddcc', emoji: '⭐', theta: 5.0,  phi: 0.2,  scale: 1.2 },
  { type: 'canvas', color: '#ff8800', emoji: '🎇', theta: -3.5, phi: -0.1, scale: 1.3 },
];

const RADIUS = 8; // 作品を配置する球の半径

// ── Three.js セットアップ ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0);

// 照明
scene.add(new THREE.AmbientLight(0xffffff, 2));
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(1,2,1);
scene.add(dir);

// 星空
function createStars() {
  const geo = new THREE.BufferGeometry();
  const positions = [];
  for(let i=0;i<2000;i++){
    const r = 80;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    positions.push(
      r*Math.sin(phi)*Math.cos(theta),
      r*Math.sin(phi)*Math.sin(theta),
      r*Math.cos(phi)
    );
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({color:0xffffff, size:0.3, transparent:true, opacity:0.8});
  scene.add(new THREE.Points(geo, mat));
}
createStars();

// ── サウンド（Web Audio API） ──
let audioCtx = null;
function getAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playWhistle() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(280, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime+0.55);
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.55);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.55);
  } catch(e){}
}
function playBoom() {
  try {
    const ctx = getAudio();
    const sr = ctx.sampleRate;
    const n = Math.floor(sr*0.55);
    const buf = ctx.createBuffer(1, n, sr);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(n*0.13));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.55);
    src.connect(g); g.connect(ctx.destination);
    src.start();
  } catch(e){}
}

// ── アニメーション花火クラス ──
const FW_COLORS = [0xff4444,0xff8800,0xffee00,0x44ff44,0x4488ff,0xcc44ff,0xff88bb,0x44ffdd,0xff6644,0xaaffaa];

class AnimatedFirework {
  constructor(scene) {
    this.scene = scene;
    this.done = false;
    this.phase = 'launch';
    this.elapsed = 0;
    this.launchDur = 0.5 + Math.random()*0.35;

    const theta = Math.random()*Math.PI*2;
    const r = 13 + Math.random()*9;
    this.bx = r * Math.cos(theta);
    this.by = 4 + Math.random()*9;
    this.bz = r * Math.sin(theta);

    // 導火線（打ち上げ中の軌跡）
    const tg = new THREE.BufferGeometry();
    tg.setAttribute('position', new THREE.Float32BufferAttribute([0,-3,0], 3));
    this.tMat = new THREE.PointsMaterial({color:0xffffcc, size:0.35, transparent:true, opacity:1});
    this.tObj = new THREE.Points(tg, this.tMat);
    scene.add(this.tObj);

    // 爆発パーティクル
    const N = 90;
    const pos = new Float32Array(N*3);
    this.vel = [];
    for(let i=0;i<N;i++){
      pos[i*3]=this.bx; pos[i*3+1]=this.by; pos[i*3+2]=this.bz;
      const sp = 0.9+Math.random()*2.2;
      const t2 = Math.random()*Math.PI*2;
      const p2 = Math.acos(2*Math.random()-1);
      this.vel.push(sp*Math.sin(p2)*Math.cos(t2), sp*Math.sin(p2)*Math.sin(t2), sp*Math.cos(p2));
    }
    this.bGeo = new THREE.BufferGeometry();
    this.bGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
    this.bMat = new THREE.PointsMaterial({
      color: FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)],
      size:0.22, transparent:true, opacity:0
    });
    this.bObj = new THREE.Points(this.bGeo, this.bMat);
    scene.add(this.bObj);
    this.basePos = pos.slice();
    this.N = N;

    playWhistle();
  }

  update(dt) {
    this.elapsed += dt;
    if(this.phase === 'launch') {
      const p = Math.min(this.elapsed/this.launchDur, 1);
      const e = p<0.5 ? 2*p*p : -1+(4-2*p)*p; // ease-in-out
      const pa = this.tObj.geometry.attributes.position.array;
      pa[0]=this.bx*e; pa[1]=-3+(this.by+3)*e; pa[2]=this.bz*e;
      this.tObj.geometry.attributes.position.needsUpdate = true;
      this.tMat.opacity = 1 - p*0.3;
      if(p >= 1) {
        this.phase = 'burst'; this.elapsed = 0;
        this.tMat.opacity = 0; this.bMat.opacity = 1;
        playBoom();
      }
    } else {
      const fade = Math.max(0, 1-this.elapsed/2.2);
      this.bMat.opacity = fade;
      const pos = this.bGeo.attributes.position.array;
      for(let i=0;i<this.N;i++){
        pos[i*3]   = this.basePos[i*3]   + this.vel[i*3]  *this.elapsed;
        pos[i*3+1] = this.basePos[i*3+1] + this.vel[i*3+1]*this.elapsed - 0.28*this.elapsed*this.elapsed;
        pos[i*3+2] = this.basePos[i*3+2] + this.vel[i*3+2]*this.elapsed;
      }
      this.bGeo.attributes.position.needsUpdate = true;
      if(fade <= 0) { this.scene.remove(this.tObj); this.scene.remove(this.bObj); this.done=true; }
    }
  }
}

const activeFireworks = [];
let nextFwTime = 1000; // 最初の花火まで1秒待つ

function launchFirework() {
  activeFireworks.push(new AnimatedFirework(scene));
}

// ── 作品を球面に配置 ──
let loadedCount = 0;
const totalCount = DEMO_WORKS.length;

function placeOnSphere(theta, phi, radius) {
  return new THREE.Vector3(
    radius * Math.cos(phi) * Math.cos(theta),
    radius * Math.sin(phi),
    radius * Math.cos(phi) * Math.sin(theta)
  );
}

function loadWorks() {
  const loader = new THREE.TextureLoader();
  DEMO_WORKS.forEach((work, i) => {
    const pos = placeOnSphere(work.theta, work.phi, RADIUS);

    if(work.type === 'png') {
      loader.load(work.url, (texture) => {
        const aspect = texture.image.width / texture.image.height;
        const geo = new THREE.PlaneGeometry(work.scale * aspect, work.scale);
        const mat = new THREE.MeshBasicMaterial({
          map: texture, transparent: true,
          side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        mesh.lookAt(0,0,0);
        mesh.userData.baseY = pos.y;
        mesh.userData.floatSpeed = 0.5 + Math.random()*0.5;
        mesh.userData.floatPhase = Math.random()*Math.PI*2;
        scene.add(mesh);
        onLoaded();
      }, undefined, () => onLoaded());
    } else if(work.type === 'canvas') {
      // Canvasでデモ画像を生成
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 256;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = work.color;
      ctx.fillRect(0,0,256,256);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(16,16,224,224);
      ctx.font = '80px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(work.emoji, 128, 110);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText('こどもの作品', 128, 200);
      const texture = new THREE.CanvasTexture(cv);
      const geo = new THREE.PlaneGeometry(work.scale, work.scale);
      const mat = new THREE.MeshBasicMaterial({
        map: texture, transparent: true,
        side: THREE.DoubleSide, depthWrite: false
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      mesh.lookAt(0,0,0);
      mesh.userData.baseY = pos.y;
      mesh.userData.floatSpeed = 0.5 + Math.random()*0.5;
      mesh.userData.floatPhase = Math.random()*Math.PI*2;
      scene.add(mesh);
      onLoaded();
    }
  });
}

function onLoaded() {
  loadedCount++;
  const pct = (loadedCount / totalCount) * 100;
  document.getElementById('loadingBar').style.width = pct + '%';
  document.getElementById('countBadge').textContent = loadedCount + ' 作品';

  if(loadedCount >= totalCount) {
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      checkGyro();
    }, 500);
  }
}

loadWorks();

// ── ジャイロ制御 ──
let useGyro = false;
let alpha = 0, beta = 0, gamma = 0;
let baseAlpha = null;

function checkGyro() {
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iPhone：許可が必要
    document.getElementById('gyroPrompt').style.display = 'flex';
  } else if(typeof DeviceOrientationEvent !== 'undefined') {
    // Android：そのまま使える
    startGyro();
  }
  // PCはマウスで操作
}

function requestGyro() {
  DeviceOrientationEvent.requestPermission().then(state => {
    document.getElementById('gyroPrompt').style.display = 'none';
    if(state === 'granted') startGyro();
  }).catch(() => {
    document.getElementById('gyroPrompt').style.display = 'none';
  });
}

function startGyro() {
  useGyro = true;
  const zee = new THREE.Vector3(0, 0, 1);
  const euler = new THREE.Euler();
  const q0 = new THREE.Quaternion();
  const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

  window.addEventListener('deviceorientation', (e) => {
    if(e.alpha === null) return;

    const heading = e.webkitCompassHeading != null
      ? THREE.MathUtils.degToRad(e.webkitCompassHeading)
      : THREE.MathUtils.degToRad(360 - e.alpha);

    euler.set(
      THREE.MathUtils.degToRad(e.beta),
      THREE.MathUtils.degToRad(e.alpha),
      THREE.MathUtils.degToRad(-e.gamma),
      'YXZ'
    );

    camera.quaternion.setFromEuler(euler);
    camera.quaternion.multiply(q1);
    camera.quaternion.multiply(q0.setFromAxisAngle(zee, -heading));
  }, true);
}

function resetView() {
  baseAlpha = alpha;
}

// マウス操作（PC用）
let mouseDown = false, mouseMoved = false;
let lastX = 0, lastY = 0;
let yaw = 0, pitch = 0;

canvas.addEventListener('mousedown', e => { mouseDown=true; mouseMoved=false; lastX=e.clientX; lastY=e.clientY; });
canvas.addEventListener('mousemove', e => {
  if(!mouseDown) return;
  mouseMoved = true;
  yaw += (e.clientX - lastX) * 0.005;
  pitch += (e.clientY - lastY) * 0.003;
  pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('click', () => {
  try { getAudio().resume(); } catch(e){}
  if(!mouseMoved) launchFirework();
});

// タッチ操作
let lastTouchX = 0, lastTouchY = 0, touchMoved = false;
canvas.addEventListener('touchstart', e => {
  touchMoved = false;
  lastTouchX = e.touches[0].clientX;
  lastTouchY = e.touches[0].clientY;
});
canvas.addEventListener('touchmove', e => {
  touchMoved = true;
  e.preventDefault();
  yaw += (e.touches[0].clientX - lastTouchX) * 0.005;
  pitch += (e.touches[0].clientY - lastTouchY) * 0.003;
  pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
  lastTouchX = e.touches[0].clientX;
  lastTouchY = e.touches[0].clientY;
}, {passive:false});
canvas.addEventListener('touchend', () => {
  if(!touchMoved) {
    try { getAudio().resume(); } catch(e){}
    launchFirework();
  }
});

// ── レンダリングループ ──
let t = 0;
let lastFrameTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;
  t += dt;

  // 定期的に花火を打ち上げ（2〜4秒ごと）
  if(now > nextFwTime && activeFireworks.length < 5) {
    launchFirework();
    nextFwTime = now + 2000 + Math.random()*2000;
  }
  for(let i = activeFireworks.length-1; i>=0; i--) {
    activeFireworks[i].update(dt);
    if(activeFireworks[i].done) activeFireworks.splice(i, 1);
  }

  if(!useGyro) {
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
  }

  // 作品をふわふわさせる
  scene.children.forEach(obj => {
    if(obj.userData.floatSpeed) {
      obj.position.y = obj.userData.baseY + Math.sin(t * obj.userData.floatSpeed + obj.userData.floatPhase) * 0.15;
    }
  });

  renderer.render(scene, camera);
}
animate(performance.now());

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
